<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrchestrateOS Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Theme Variables */
        :root {
            --bg-primary: #0C0C0F;
            --bg-secondary: #101014;
            --bg-tertiary: #1A1A1E;
            --bg-hover: #2A2A2E;
            --border-color: #1A1A1E;
            --border-hover: #2A2A2E;
            --text-primary: #E8E8EC;
            --text-secondary: #999;
            --text-muted: #666;
            --text-dim: #555;
            --text-faint: #444;
            --accent: #E44332;
            --accent-hover: #c93a2b;
            --code-bg: #1A1A1E;
        }

        body.light-mode {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --bg-tertiary: #F1F3F4;
            --bg-hover: #E8EAED;
            --border-color: #E0E0E0;
            --border-hover: #DADCE0;
            --text-primary: #202124;
            --text-secondary: #5F6368;
            --text-muted: #80868B;
            --text-dim: #9AA0A6;
            --text-faint: #BDC1C6;
            --accent: #E44332;
            --accent-hover: #c93a2b;
            --code-bg: #F1F3F4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Doc list sidebar */
        .doc-list-sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        body.focus-mode .doc-list-sidebar {
            display: none;
        }
        body.focus-mode .top-bar {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.focus-mode .top-bar:hover {
            opacity: 1;
        }
        body.focus-mode .editor-container {
            max-width: 800px;
        }
        /* Exit hint */
        .focus-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        body.focus-mode .focus-hint {
            opacity: 1;
            animation: fadeOut 3s ease forwards;
            animation-delay: 2s;
        }
        
        body.light-mode .doc-content * { color: inherit; }
        body.light-mode .doc-content font[color] { color: var(--text-primary) !important; }
        body.light-mode .doc-content span:not(.doc-link) { color: var(--text-primary) !important; }
        body.light-mode .doc-content pre code { color: #333; }
        body.light-mode .doc-content:empty:before { color: var(--text-dim); }

        @keyframes fadeOut {
            to { opacity: 0; }
        }
        .doc-list-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .doc-list-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .doc-list-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .new-doc-btn {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .new-doc-btn:hover { background: var(--accent-hover); }

        .search-box {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-muted); }

        .filters-row {
            display: flex;
            gap: 8px;
        }
        .filter-select {
            flex: 1;
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--accent); }

        .doc-list-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .doc-list-item {
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .doc-list-item:hover { background: var(--bg-tertiary); }
        .doc-list-item.active {
            background: rgba(228,67,50,0.12);
            border-left-color: var(--accent);
        }
        .doc-list-item-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        .doc-list-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-collection-tag {
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(228,67,50,0.15);
            color: var(--accent);
            border-radius: 4px;
            font-weight: 600;
        }
        .doc-time { font-size: 11px; color: var(--text-dim); }
        .timeline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 8px;
            flex-shrink: 0;
        }
        .timeline-dot.old { background: var(--text-faint); }
        .timeline-dot.recent { background: #10B981; }

        /* Main editor */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 56px;
            background: #0C0C0F;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .collection-label {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: lowercase;
        }
        /* Collection colors */
        .collection-label.notes, .collection-badge.notes { background: rgba(99,102,241,0.2); color: #818CF8; }
        .collection-label.projects, .collection-badge.projects { background: rgba(16,185,129,0.2); color: #34D399; }
        .collection-label.logs, .collection-badge.logs { background: rgba(245,158,11,0.2); color: #FBBF24; }
        .collection-label.inbox, .collection-badge.inbox { background: rgba(239,68,68,0.2); color: #F87171; }
        .collection-label.resources, .collection-badge.resources { background: rgba(139,92,246,0.2); color: #A78BFA; }
        .collection-label.permanent-notes, .collection-badge.permanent-notes { background: rgba(6,182,212,0.2); color: #22D3EE; }
        .collection-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: lowercase;
        }
        .collection-chip {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            text-transform: lowercase;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .collection-chip:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }
        .collection-chip.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
            color: var(--text-primary);
        }
        .collection-chip.notes.active { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); color: #818CF8; }
        .collection-chip.projects.active { background: rgba(16,185,129,0.3); border-color: rgba(16,185,129,0.5); color: #34D399; }
        .collection-chip.logs.active { background: rgba(245,158,11,0.3); border-color: rgba(245,158,11,0.5); color: #FBBF24; }
        .collection-chip.inbox.active { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); color: #F87171; }
        /* Default for custom collections */
        .collection-chip.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); color: var(--text-primary); }
        .collection-badge { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        /* Sort chips */
        .timeline-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .timeline-sort {
            display: flex;
            gap: 6px;
        }
        .sort-chip {
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 13px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .sort-chip:hover { color: var(--text-secondary); }
        .sort-chip.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }
        /* Collection chips - scrollable */
        .collection-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
            max-width: 100%;
        }
        .collection-chips::-webkit-scrollbar { display: none; }
        .collection-chip { flex-shrink: 0; }
        .collection-chips::-webkit-scrollbar { display: none; }
        /* Card actions */
        .card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .timeline-card-delete {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid var(--bg-hover);
            border-radius: 50%;
            color: #F87171;
            font-size: 18px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
        }
        .timeline-card:hover .timeline-card-delete { opacity: 1; }
        .timeline-card-delete:hover {
            border-color: rgba(239,68,68,0.4);
        }
        .collection-select:focus { outline: none; background: var(--bg-tertiary); color: var(--text-primary); }
        .save-status { font-size: 12px; color: var(--text-muted); }
        .save-status.saving { color: #F5A623; }
        .save-status.saved { color: #10B981; }
        .delete-btn {
            padding: 6px 12px;
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: 6px;
            color: #DC2626;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .delete-btn:hover { background: rgba(220,38,38,0.2); }

        /* Doc Navigation Buttons */
        .doc-nav-btns {
            position: fixed;
            bottom: 32px;
            right: 32px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .doc-nav-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-hover);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .doc-nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: scale(1.05);
        }
        .doc-nav-btn:disabled {
            opacity: 0.25;
            cursor: default;
        }
        .doc-nav-btn:disabled:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transform: none;
        }
        .doc-nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .editor-surface {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
            background: var(--bg-primary);
        }
        .editor-container {
            width: 100%;
            max-width: 720px;
        }
        .doc-title {
            font-size: 32px;
            font-weight: 700;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            width: 100%;
            margin-bottom: 8px;
            line-height: 1.2;
            outline: none;
        }
        .doc-meta {
            font-size: 12px;
            color: var(--text-faint);
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
        }

        /* WYSIWYG Content */
        .doc-content {
            width: 100%;
            min-height: 500px;
            outline: none;
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 16px;
            line-height: 1.8;
        }
        /* Force all text to white except links */
        .doc-content * {
            color: inherit;
        }
        .doc-content font[color] {
            color: var(--text-primary) !important;
        }
        .doc-content span:not(.doc-link) {
            color: var(--text-primary) !important;
        }
        .doc-content .doc-link {
            color: #5B9BD5 !important;
        }
        .doc-content:empty:before {
            content: 'Start writing...';
            color: var(--text-dim);
        }
        .doc-content h1 { font-size: 28px; font-weight: 700; margin: 24px 0 16px; color: var(--text-primary); }
        .doc-content h2 { font-size: 22px; font-weight: 600; margin: 20px 0 12px; color: var(--text-primary); border-bottom: 1px solid var(--bg-hover); padding-bottom: 8px; }
        .doc-content h3 { font-size: 18px; font-weight: 600; margin: 16px 0 10px; color: var(--text-primary); }
        .doc-content p { margin: 12px 0; }
        .doc-content ul, .doc-content ol { margin: 12px 0; padding-left: 24px; }
        .doc-content li { margin: 6px 0; }
        /* Nested list styles */
        .doc-content ul ul, .doc-content ol ul {
            margin: 4px 0;
            padding-left: 20px;
            list-style-type: circle;
        }
        .doc-content ul ul ul, .doc-content ol ul ul {
            list-style-type: square;
        }
        .doc-content ol ol {
            margin: 4px 0;
            padding-left: 20px;
            list-style-type: lower-alpha;
        }
        .doc-content ol ol ol {
            list-style-type: lower-roman;
        }
        .doc-content code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }
        .doc-content pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }
        .doc-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: inherit;
            color: var(--text-primary);
        }
        .doc-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .doc-content strong, .doc-content b { font-weight: 600; }
        .doc-content em, .doc-content i { font-style: italic; }
        .doc-content a { color: var(--accent); text-decoration: underline; }
        .wiki-link { color: #5B9BD5; background: rgba(91, 155, 213, 0.15); padding: 1px 4px; border-radius: 3px; text-decoration: none; cursor: pointer; transition: background 0.2s; }
        .wiki-link:hover { background: rgba(91, 155, 213, 0.25); }
        .doc-content hr { border: none; border-top: 1px solid var(--bg-hover); margin: 24px 0; }

        /* Doc Links (@ mentions) */
        .doc-link {
            color: #5B9BD5;
            background: rgba(91, 155, 213, 0.15);
            padding: 1px 4px;
            border-radius: 3px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .doc-link:hover {
            background: rgba(91, 155, 213, 0.25);
        }

        /* @ Mention Dropdown */
        .mention-dropdown {
            position: absolute;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1001;
            display: none;
            min-width: 200px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        .mention-dropdown.visible { display: block; }
        .mention-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid var(--bg-hover);
        }
        .mention-item:last-child { border-bottom: none; }
        .mention-item:hover, .mention-item.selected {
            background: rgba(228, 67, 50, 0.15);
        }
        .mention-item .collection-tag {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 8px;
        }
        .mention-create {
            color: var(--accent);
            font-style: italic;
        }

        /* Slash Command Menu */
        .slash-menu {
            position: absolute;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1002;
            display: none;
            min-width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        .slash-menu.visible { display: block; }
        .slash-menu-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid var(--bg-hover);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slash-menu-item:last-child { border-bottom: none; }
        .slash-menu-item:hover, .slash-menu-item.selected {
            background: rgba(228, 67, 50, 0.15);
        }
        .slash-menu-item-icon {
            width: 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .slash-menu-item-label {
            flex: 1;
        }
        .slash-menu-item-shortcut {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Backlinks Section */
        .backlinks-section {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-hover);
        }
        .backlinks-header {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .backlinks-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .backlink-item {
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }
        .backlink-item:hover {
            background: var(--bg-hover);
        }
        .backlinks-empty {
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
        }

        /* Floating Toolbar */
        .toolbar {
            position: fixed;
            display: none;
            gap: 2px;
            padding: 6px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-hover);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 1000;
            transform: translateX(-50%);
        }
        .toolbar.visible { display: flex; }
        .toolbar::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--bg-secondary);
        }
        .toolbar-btn {
            padding: 6px 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }
        .toolbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-text { font-size: 16px; }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }
        .view-btn {
            width: 28px;
            height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .view-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
        .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* Theme Toggle Button */
        .theme-toggle {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-hover);
            border-radius: 50%;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .theme-toggle svg {
            width: 18px;
            height: 18px;
        }
        /* Show moon in dark mode, sun in light mode */
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }

        <div class="filter-modal-content">

            <input type="text" class="filter-search" id="modalSearchBox" placeholder="Search by title..." oninput="applyModalFilter()">

    <script>
        let currentDocId = null;
        let currentDisplayedDocs = []; // Track currently displayed docs for navigation
        let saveTimeout = null;
        let pendingSave = false; // Prevent auto-refresh from overwriting unsaved edits
        let docs = [];
        let docOpenedFromCollection = null; // Track collection context when opening doc
        let navDocsLocked = false; // Lock nav list while viewing a doc from timeline
        const defaultCollections = ['Notes', 'Permanent Notes', 'Projects', 'Logs', 'Resources', 'Inbox'];
        const docContent = document.getElementById('docContent');


        // Doc navigation keyboard shortcuts (Cmd+ArrowUp/Down)
        // Uses capture phase to intercept before contenteditable default behavior
        document.addEventListener('keydown', function(e) {
            if (!(e.metaKey || e.ctrlKey)) return;
            if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;

            // If viewing a doc, navigate to prev/next
            if (currentDocId && currentDisplayedDocs.length > 0) {
                e.preventDefault();
                e.stopPropagation();
                // Auto-save before navigating (fire-and-forget)
                saveDoc();
                navigateDoc(e.key === 'ArrowUp' ? -1 : 1);
            }
        }, true); // capture phase

        // Load docs
        async function loadDocList() {
            try {
                const res = await fetch('/docs/list?_=' + Date.now());
                const data = await res.json();
                docs = data.docs || [];
                updateCollectionFilter();
                renderDocList();
            } catch (e) {
                console.error('Failed to load docs:', e);
            }
        }

        function updateCollectionFilter() {
            const filter = document.getElementById('collectionFilter');
            const collections = new Set(defaultCollections);
            docs.forEach(d => { if (d.collection) collections.add(d.collection); });
            filter.innerHTML = '<option value="">All Collections</option>' +
                Array.from(collections).sort().map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // Debounce timer for API search
        let searchDebounceTimer = null;

        function filterDocs() {
            const search = document.getElementById('searchBox').value.trim();
            const collection = document.getElementById('collectionFilter').value;
            const sort = document.getElementById('sortSelect').value;

            // If search query exists, use API search (debounced)
            if (search.length >= 2) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    performAPISearch(search, collection, sort);
                }, 300);
                return;
            }

            // No search query - do client-side filtering only
            let filtered = docs.filter(d => {
                const matchCollection = !collection || d.collection === collection;
                return matchCollection;
            });

            filtered.sort((a, b) => {
                if (sort === 'title') return (a.title || '').localeCompare(b.title || '');
                if (sort === 'created') return new Date(b.created_at || 0) - new Date(a.created_at || 0);
                return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
            });

            renderDocList(filtered);
        }

        async function performAPISearch(query, collection, sort) {
            try {
                const params = { query: query, max_results: 50 };
                if (collection) params.collection = collection;

                const response = await fetch('/execute_task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tool_name: 'docs',
                        action: 'search_docs',
                        params: params
                    })
                });
                const result = await response.json();

                if (result.status === 'success' && result.docs) {
                    // Map API results to match docs array format
                    let filtered = result.docs.map(d => ({
                        id: d.id,
                        title: d.title,
                        collection: d.collection,
                        updated_at: d.updated_at,
                        created_at: d.created_at || d.updated_at,
                        word_count: d.word_count,
                        score: d.score
                    }));

                    // Sort by relevance (score) by default for searches, or by user preference
                    if (sort === 'title') {
                        filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                    } else if (sort === 'created') {
                        filtered.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                    } else if (sort === 'updated') {
                        filtered.sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
                    }
                    // Default: keep API's relevance ordering (by score)

                    renderDocList(filtered);
                } else {
                    console.error('Search failed:', result);
                    renderDocList([]);
                }
            } catch (e) {
                console.error('Search API error:', e);
                renderDocList([]);
            }
        }

        // Filter Modal Functions
        let activeCollection = '';

        function openFilterModal() {
            populateCollectionPills();
            document.getElementById('modalSearchBox').value = document.getElementById('searchBox').value;
            document.getElementById('filterModal').classList.add('active');
            document.getElementById('modalSearchBox').focus();
        }

        function closeFilterModal() {
            document.getElementById('filterModal').classList.remove('active');
            updateFilterButtonState();
        }

        function populateCollectionPills() {
            const collections = [...new Set(docs.map(d => d.collection).filter(Boolean))].sort();
            const container = document.getElementById('collectionPills');
            container.innerHTML = collections.map(c =>
                `<button class="collection-pill ${activeCollection === c ? 'active' : ''}" onclick="selectCollection('${c}')">${c}</button>`
            ).join('');
        }

        function selectCollection(collection) {
            if (activeCollection === collection) {
                activeCollection = '';
            } else {
                activeCollection = collection;
            }
            document.getElementById('collectionFilter').value = activeCollection;
            populateCollectionPills();
            filterDocs();
        }

        function applyModalFilter() {
            const modalSearch = document.getElementById('modalSearchBox').value;
            document.getElementById('searchBox').value = modalSearch;
            filterDocs();
        }

        function clearFilters() {
            activeCollection = '';
            document.getElementById('collectionFilter').value = '';
            document.getElementById('modalSearchBox').value = '';
            document.getElementById('searchBox').value = '';
            populateCollectionPills();
            filterDocs();
            updateFilterButtonState();
        }

        function updateFilterButtonState() {
            const btn = document.getElementById('filterBtn');
            const hasFilter = activeCollection || document.getElementById('searchBox').value;
            btn.classList.toggle('has-filter', !!hasFilter);
        }

        function getTimelineDotClass(dateStr) {
            if (!dateStr) return 'old';
            const diff = Date.now() - new Date(dateStr).getTime();
            if (diff < 3600000) return 'recent';
            if (diff < 86400000) return '';
            return 'old';
        }

        function renderDocList(filteredDocs = null) {
            const list = document.getElementById('docList');
            const docsToRender = filteredDocs || docs;
            // Only update nav list if not locked (prevents overwriting timeline order while viewing doc)
            if (!navDocsLocked) {
                currentDisplayedDocs = docsToRender;
            }
            updateNavButtons();

            if (docsToRender.length === 0) {
                list.innerHTML = '<div style="padding: 20px; color: var(--text-muted); text-align: center;">No documents</div>';
                return;
            }

            list.innerHTML = docsToRender.map(doc => `
                <div class="doc-list-item ${doc.id === currentDocId ? 'active' : ''}" onclick="loadDoc('${doc.id}')">
                    <div class="doc-list-item-title">
                        <span class="timeline-dot ${getTimelineDotClass(doc.updated_at)}"></span>
                        ${doc.title || 'Untitled'}
                    </div>
                    <div class="doc-list-item-meta">
                        <span class="doc-collection-tag">${doc.collection || 'Notes'}</span>
                        <span class="doc-time">${formatDate(doc.updated_at)}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadDoc(docId) {
            try {
                const res = await fetch(`/docs/get/${docId}`);
                const data = await res.json();
                if (data.status === 'success') {
                    currentDocId = docId;
                    const doc = data.doc;
                    document.getElementById('docTitle').value = doc.title || '';
                    document.getElementById('docContent').innerHTML = doc.content || '';
                    setCollection(doc.collection || 'Notes');
                    lastKnownUpdatedAt = doc.updated_at; // Track for auto-refresh
                    document.getElementById('docMeta').innerHTML = `
                        <span>Created ${formatDate(doc.created_at)}</span>
                        <span>Updated ${formatDate(doc.updated_at)}</span>
                    `;
                    document.getElementById('editorContainer').style.display = 'block';
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('deleteBtn').style.display = 'block';
                    document.getElementById('docNavBtns').style.display = 'flex';
                    updateNavButtons();
                    renderDocList();
                    loadBacklinks(docId);
                    attachDocLinkHandlers(); // Re-attach click handlers to doc-links
                }
            } catch (e) {
                console.error('Failed to load doc:', e);
            }
        }

        function handleWikiLink(el) {
            const title = el.getAttribute('data-title');
            const doc = allDocsCache.find(d => d.title.toLowerCase() === title.toLowerCase());
            if (doc) {
                loadDoc(doc.id);
            } else {
                console.log('Wiki link target not found:', title);
            }
        }

        function newDoc() {
            currentDocId = null;
            lastKnownUpdatedAt = null; // Reset for new doc
            document.getElementById('docTitle').value = '';
            document.getElementById('docContent').innerHTML = '';
            setCollection('Notes');
            document.getElementById('docMeta').innerHTML = '<span>New document</span>';
            document.getElementById('editorContainer').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('docNavBtns').style.display = 'none';
            document.getElementById('docTitle').focus();
            renderDocList();
        }


        // ===== DOC NAVIGATION =====
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevDocBtn');
            const nextBtn = document.getElementById('nextDocBtn');
            if (!prevBtn || !nextBtn || !currentDocId) return;
            
            const currentIndex = currentDisplayedDocs.findIndex(d => d.id === currentDocId);
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= currentDisplayedDocs.length - 1 || currentIndex === -1;
        }

        function navigateDoc(direction) {
            if (!currentDocId || currentDisplayedDocs.length === 0) return;
            
            const currentIndex = currentDisplayedDocs.findIndex(d => d.id === currentDocId);
            if (currentIndex === -1) return;
            
            const newIndex = currentIndex + direction;
            if (newIndex < 0 || newIndex >= currentDisplayedDocs.length) return;
            
            const newDoc = currentDisplayedDocs[newIndex];
            loadDoc(newDoc.id);
        }

        // ===== BIDIRECTIONAL LINKING =====
        let mentionSearchTerm = '';
        let mentionStartPos = null;
        let selectedMentionIndex = 0;

        async function fetchAllDocs() {
            try {
                const res = await fetch('/docs/list');
                const data = await res.json();
                if (data.status === 'success') {
                    allDocsCache = data.docs || [];
                }
            } catch (e) {
                console.error('Failed to fetch docs for linking:', e);
            }
        }

        async function loadBacklinks(docId) {
            const section = document.getElementById('backlinksSection');
            const list = document.getElementById('backlinksList');
            
            try {
                const res = await fetch(`/docs/backlinks/${docId}`);
                const data = await res.json();
                
                if (data.status === 'success' && data.backlinks && data.backlinks.length > 0) {
                    list.innerHTML = data.backlinks.map(bl => 
                        `<div class="backlink-item" onclick="loadDoc('${bl.doc_id}')">${bl.title}</div>`
                    ).join('');
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            } catch (e) {
                console.error('Failed to load backlinks:', e);
                section.style.display = 'none';
            }
        }

        async function createDocLink(targetDocId, targetTitle) {
            if (!currentDocId) {
                // Save current doc first
                await saveDoc();
                if (!currentDocId) return; // Still no doc id
            }
            
            try {
                const res = await fetch('/docs/link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_doc_id: currentDocId,
                        target_doc_id: targetDocId
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    console.log('Link created:', currentDocId, '->', targetDocId);
                }
            } catch (e) {
                console.error('Failed to create link:', e);
            }
        }

        async function createDocFromMention(title) {
            // Convert to Title Case for the doc title
            const titleCased = title.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
            
            try {
                const res = await fetch('/docs/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: titleCased,
                        content: '',
                        collection: 'Inbox'
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    // Refresh docs cache
                    await fetchAllDocs();
                    return { id: data.doc_id, title: titleCased };
                }
            } catch (e) {
                console.error('Failed to create doc from mention:', e);
            }
            return null;
        }

        function showMentionDropdown(x, y) {
            const dropdown = document.getElementById('mentionDropdown');
            dropdown.style.left = x + 'px';
            dropdown.style.top = y + 'px';
            dropdown.classList.add('visible');
        }

        function hideMentionDropdown() {
            const dropdown = document.getElementById('mentionDropdown');
            dropdown.classList.remove('visible');
            mentionSearchTerm = '';
            mentionStartPos = null;
            selectedMentionIndex = 0;
        }

        function filterDocsForMention(search) {
            const term = search.toLowerCase();
            let filtered = allDocsCache.filter(d => 
                d.id !== currentDocId && 
                d.title.toLowerCase().includes(term)
            ).slice(0, 5);
            
            // Add "Create new" option if search term exists
            if (term.length > 0) {
                filtered.push({ id: '__create__', title: search, isCreate: true });
            }
            
            return filtered;
        }

        function renderMentionDropdown(docs) {
            const dropdown = document.getElementById('mentionDropdown');
            if (docs.length === 0) {
                dropdown.innerHTML = '<div class="mention-item" style="color: var(--text-muted);">No docs found</div>';
                return;
            }
            
            dropdown.innerHTML = docs.map((doc, i) => {
                if (doc.isCreate) {
                    return `<div class="mention-item mention-create ${i === selectedMentionIndex ? 'selected' : ''}" 
                        data-id="__create__" data-title="${doc.title}">
                        + Create "${doc.title}"
                    </div>`;
                }
                return `<div class="mention-item ${i === selectedMentionIndex ? 'selected' : ''}" 
                    data-id="${doc.id}" data-title="${doc.title}">
                    ${doc.title}
                    <span class="collection-tag">${doc.collection || ''}</span>
                </div>`;
            }).join('');
        }

        async function insertDocLink(docId, title) {
            const docContent = document.getElementById('docContent');
            const selection = window.getSelection();
            
            if (!selection.rangeCount) return;
            
            // Delete the @searchTerm
            const range = selection.getRangeAt(0);
            if (mentionStartPos !== null) {
                // Find and delete the @term
                const walker = document.createTreeWalker(docContent, NodeFilter.SHOW_TEXT);
                let node;
                let found = false;
                
                while (node = walker.nextNode()) {
                    const atIndex = node.textContent.lastIndexOf('@');
                    if (atIndex !== -1 && !found) {
                        // Delete from @ to current position
                        const deleteRange = document.createRange();
                        deleteRange.setStart(node, atIndex);
                        deleteRange.setEnd(range.startContainer, range.startOffset);
                        deleteRange.deleteContents();
                        found = true;
                        
                        // Insert the link - lowercase first letter of each word for natural flow
                        const displayText = title.split(' ').map(word => 
                            word.charAt(0).toLowerCase() + word.slice(1)
                        ).join(' ');
                        const link = document.createElement('span');
                        link.className = 'doc-link';
                        link.setAttribute('data-doc-id', docId);
                        link.setAttribute('data-doc-title', title);
                        link.setAttribute('contenteditable', 'false');
                        link.textContent = displayText;
                        link.title = title; // Tooltip shows real title
                        link.onclick = () => loadDoc(docId);
                        
                        // Insert a plain space after the link
                        const spacer = document.createTextNode(' ');
                        
                        // Insert link, then spacer
                        range.insertNode(spacer);
                        range.insertNode(link);
                        
                        // Position cursor after spacer
                        const newRange = document.createRange();
                        newRange.setStartAfter(spacer);
                        newRange.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        
                        // Force reset text color to white using execCommand
                        document.execCommand('foreColor', false, '#E8E8EC');
                        break;
                    }
                }
            }
            
            // Create the bidirectional link
            await createDocLink(docId, title);
            
            // Hide dropdown and schedule save
            hideMentionDropdown();
            scheduleAutoSave();
        }

        async function insertDocEmbed(docId, title) {
            // Fetch the doc content and insert it inline
            try {
                const res = await fetch(`/docs/get/${docId}`);
                const data = await res.json();
                
                if (data.status === 'success' && data.doc) {
                    // First delete the @mention text (same as link insertion)
                    const docContentEl = document.getElementById('docContent');
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    
                    const range = selection.getRangeAt(0);
                    
                    // Find and delete @term
                    if (mentionStartPos !== null) {
                        const text = range.startContainer.textContent || '';
                        const atIdx = text.lastIndexOf('@');
                        if (atIdx !== -1) {
                            range.setStart(range.startContainer, atIdx);
                            range.deleteContents();
                        }
                    }
                    
                    // Build embed HTML
                    const embedContent = data.doc.content || '(empty document)';
                    const sourceLink = `<br><span style="font-size:12px;color:#666;">Source: <span class="doc-link" data-doc-id="${docId}" onclick="loadDoc('${docId}')" style="font-size:12px;">${title}</span></span>`;
                    
                    // Insert using execCommand
                    document.execCommand('insertHTML', false, embedContent + sourceLink + ' ');
                    
                    // Create backlink
                    if (currentDocId) {
                        await createDocLink(docId, title);
                    }
                    
                    hideMentionDropdown();
                    scheduleAutoSave();
                }
            } catch (e) {
                console.error('Failed to embed doc:', e);
            }
        }

        // Setup @ mention detection
        function setupMentionDetection() {
            const docContent = document.getElementById('docContent');
            
            docContent.addEventListener('input', async (e) => {
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                
                const range = selection.getRangeAt(0);
                const node = range.startContainer;
                
                if (node.nodeType !== Node.TEXT_NODE) return;
                
                const text = node.textContent;
                const cursorPos = range.startOffset;
                
                // Look for @ before cursor
                const beforeCursor = text.substring(0, cursorPos);
                const atIndex = beforeCursor.lastIndexOf('@');
                
                if (atIndex !== -1 && (atIndex === 0 || beforeCursor[atIndex - 1] === ' ' || beforeCursor[atIndex - 1] === '\n')) {
                    // We're in a mention
                    mentionSearchTerm = beforeCursor.substring(atIndex + 1);
                    mentionStartPos = atIndex;
                    
                    // Get position for dropdown
                    const tempRange = document.createRange();
                    tempRange.setStart(node, atIndex);
                    tempRange.setEnd(node, atIndex);
                    const rect = tempRange.getBoundingClientRect();
                    
                    // Fetch docs if cache is empty
                    if (allDocsCache.length === 0) {
                        await fetchAllDocs();
                    }
                    
                    const filtered = filterDocsForMention(mentionSearchTerm);
                    selectedMentionIndex = 0;
                    renderMentionDropdown(filtered);
                    showMentionDropdown(rect.left, rect.bottom + 5);
                } else {
                    hideMentionDropdown();
                }
            });
            
            // Handle keyboard navigation in dropdown
            docContent.addEventListener('keydown', async (e) => {
                const dropdown = document.getElementById('mentionDropdown');
                if (!dropdown.classList.contains('visible')) return;
                
                const items = dropdown.querySelectorAll('.mention-item');
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedMentionIndex = Math.min(selectedMentionIndex + 1, items.length - 1);
                    renderMentionDropdown(filterDocsForMention(mentionSearchTerm));
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedMentionIndex = Math.max(selectedMentionIndex - 1, 0);
                    renderMentionDropdown(filterDocsForMention(mentionSearchTerm));
                } else if (e.key === 'Enter' || e.key === 'Tab') {
                    e.preventDefault();
                    const selected = items[selectedMentionIndex];
                    if (selected) {
                        const docId = selected.getAttribute('data-id');
                        const title = selected.getAttribute('data-title');
                        
                        if (docId === '__create__') {
                            // Create new doc (always link, can't embed non-existent)
                            const newDoc = await createDocFromMention(title);
                            if (newDoc) {
                                await insertDocLink(newDoc.id, newDoc.title);
                            }
                        } else if (e.shiftKey) {
                            // Shift+Enter = embed content inline
                            await insertDocEmbed(docId, title);
                        } else {
                            // Enter = insert link
                            await insertDocLink(docId, title);
                        }
                    }
                } else if (e.key === 'Escape') {
                    hideMentionDropdown();
                }
            });
            
            // Handle click on dropdown items
            document.getElementById('mentionDropdown').addEventListener('click', async (e) => {
                const item = e.target.closest('.mention-item');
                if (!item) return;
                
                const docId = item.getAttribute('data-id');
                const title = item.getAttribute('data-title');
                
                if (docId === '__create__') {
                    const newDoc = await createDocFromMention(title);
                    if (newDoc) {
                        await insertDocLink(newDoc.id, newDoc.title);
                    }
                } else {
                    await insertDocLink(docId, title);
                }
            });
            
            // Hide dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.mention-dropdown') && !e.target.closest('.doc-content')) {
                    hideMentionDropdown();
                }
            });
        }

        function attachDocLinkHandlers() {

                link.onclick = () => loadDoc(link.getAttribute('data-doc-id'));
            });

        document.addEventListener('DOMContentLoaded', () => {

        function scheduleAutoSave() {
            document.getElementById('saveStatus').textContent = 'Editing...';
            document.getElementById('saveStatus').className = 'save-status';
            pendingSave = true;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveDoc, 800);

        async function saveDoc() {
            const title = document.getElementById('docTitle').value;
            const content = document.getElementById('docContent').innerHTML;
            const collection = document.getElementById('collectionLabel').textContent;

            if (!title && !content) return;

            document.getElementById('saveStatus').textContent = 'Saving...';
            document.getElementById('saveStatus').className = 'save-status saving';

            try {
                const res = await fetch('/docs/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentDocId,
                        title: title || 'Untitled',
                        content: content,
                        collection: collection
                    })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    pendingSave = false;
                    if (!currentDocId) {
                        currentDocId = data.doc_id;
                        document.getElementById('deleteBtn').style.display = 'block';
                    }
                    document.getElementById('saveStatus').textContent = 'Saved';
                    document.getElementById('saveStatus').className = 'save-status saved';
                    loadDocList();
                }
            } catch (e) {
                console.error('Failed to save:', e);
                document.getElementById('saveStatus').textContent = 'Save failed';
            }
        }

        async function deleteDoc() {
            if (!currentDocId) return;
            if (!confirm('Delete this document?')) return;
            try {
                const res = await fetch(`/docs/delete/${currentDocId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.status === 'success') {
                    currentDocId = null;
                    document.getElementById('editorContainer').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('deleteBtn').style.display = 'none';
                    loadDocList();
                }
            } catch (e) {
                console.error('Failed to delete:', e);
            }
        }

        // WYSIWYG Formatting - using manual DOM manipulation for reliability
        function format(type) {
            event.preventDefault();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);

            switch(type) {
                case 'bold':
                    document.execCommand('bold', false, null);
                    break;
                case 'italic':
                    document.execCommand('italic', false, null);
                    break;
                case 'code':
                    const code = document.createElement('code');
                    code.appendChild(range.extractContents());
                    range.insertNode(code);
                    selection.removeAllRanges();
                    break;
                case 'h1':
                    wrapInBlock('h1', range, selection);
                    break;
                case 'h2':
                    wrapInBlock('h2', range, selection);
                    break;
                case 'h3':
                    wrapInBlock('h3', range, selection);
                    break;
                case 'h4':
                    wrapInBlock('h4', range, selection);
                    break;
                case 'strikethrough':
                    document.execCommand('strikeThrough', false, null);
                    break;
                case 'hr':
                    const hr = document.createElement('hr');
                    range.deleteContents();
                    range.insertNode(hr);
                    // Move cursor after hr
                    const afterHr = document.createRange();
                    afterHr.setStartAfter(hr);
                    afterHr.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(afterHr);
                    break;
                case 'ul':
                case 'ol':
                    // Check if selection is inside a block element
                    let listContainer = range.commonAncestorContainer;
                    if (listContainer.nodeType === 3) listContainer = listContainer.parentNode;

                    // Find the parent block element
                    let blockParent = listContainer;
                    while (blockParent && blockParent !== docContent &&
                           !['P', 'DIV', 'H1', 'H2', 'H3', 'H4'].includes(blockParent.tagName)) {
                        blockParent = blockParent.parentNode;
                    }

                    const listTag = type === 'ol' ? 'ol' : 'ul';
                    const newList = document.createElement(listTag);
                    const li = document.createElement('li');

                    if (blockParent && blockParent !== docContent && ['P', 'DIV', 'H1', 'H2', 'H3', 'H4'].includes(blockParent.tagName)) {
                        // Replace the entire block with a list containing its text
                        let text = blockParent.textContent || '';
                        // Strip leading dash/asterisk and whitespace
                        text = text.replace(/^[-*]\s*/, '');
                        li.textContent = text;
                        newList.appendChild(li);
                        blockParent.parentNode.replaceChild(newList, blockParent);
                    } else {
                        // Original behavior for selections not in a block
                        const fragment = range.extractContents();
                        // Strip leading dash and whitespace from text
                        if (fragment.firstChild && fragment.firstChild.nodeType === 3) {
                            fragment.firstChild.textContent = fragment.firstChild.textContent.replace(/^[-*]\s*/, '');
                        }
                        li.appendChild(fragment);
                        newList.appendChild(li);
                        range.insertNode(newList);
                    }
                    selection.removeAllRanges();
                    break;
                case 'quote':
                    const blockquote = document.createElement('blockquote');
                    blockquote.appendChild(range.extractContents());
                    range.insertNode(blockquote);
                    selection.removeAllRanges();
                    break;
                case 'link':
                    const url = prompt('Enter URL:');
                    if (url) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.appendChild(range.extractContents());
                        range.insertNode(a);
                        selection.removeAllRanges();
                    }
                    break;
            }
            document.getElementById('floatingToolbar').classList.remove('visible');
            scheduleAutoSave();
        }

        function wrapInBlock(tag, range, selection) {
            // Get the parent block or create new
            let container = range.commonAncestorContainer;
            if (container.nodeType === 3) container = container.parentNode;

            // If already in a block element, replace it
            if (container.tagName && ['P', 'DIV', 'H1', 'H2', 'H3', 'H4'].includes(container.tagName)) {
                const newEl = document.createElement(tag);
                newEl.innerHTML = container.innerHTML;
                container.parentNode.replaceChild(newEl, container);
            } else {
                // Wrap selection in new block
                const newEl = document.createElement(tag);
                newEl.appendChild(range.extractContents());
                range.insertNode(newEl);
            }
            selection.removeAllRanges();
        }

        // Show toolbar on selection
        function checkSelection() {
            const selection = window.getSelection();
            const selectedText = selection.toString().trim();

            if (selectedText.length > 0 && docContent.contains(selection.anchorNode)) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();

                // Position toolbar above selection, centered
                const toolbarEl = document.getElementById('floatingToolbar');
                toolbarEl.style.left = `${rect.left + rect.width / 2}px`;
                toolbarEl.style.top = `${rect.top - 50}px`;
                toolbarEl.classList.add('visible');
            } else {
                document.getElementById('floatingToolbar').classList.remove('visible');
            }
        }

        // Focus mode - distraction free writing
        let focusTimeout = null;
        // Collection helper
        // Generate consistent color from string
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return { hue, color: `hsl(${hue}, 70%, 65%)`, bg: `hsla(${hue}, 70%, 50%, 0.2)` };
        }

        function setCollection(name) {
            const label = document.getElementById('collectionLabel');
            label.textContent = name;
            const slug = name.toLowerCase().replace(/\s+/g, '-');
            label.className = 'collection-label ' + slug;
            // Apply dynamic color for custom collections
            const knownCollections = ['notes', 'projects', 'logs', 'inbox', 'resources', 'permanent-notes'];
            if (!knownCollections.includes(slug)) {
                const { color, bg } = stringToColor(name);
                label.style.color = color;
                label.style.background = bg;
            } else {
                label.style.color = '';
                label.style.background = '';
            }
        }

        // Hashtag collection detection
        const validCollections = ['notes', 'permanent notes', 'projects', 'logs', 'resources', 'inbox'];
        function detectHashtagCollection() {
            const content = document.getElementById('docContent').innerHTML;
            // Match #hashtag followed by space, &nbsp;, <br>, or newline
            const match = content.match(/#([a-zA-Z][a-zA-Z0-9-]*)(?:\s|&nbsp;|<br>|<br\/>|<br \/>)/i);
            if (match) {
                let collection = match[1].toLowerCase().replace(/-+/g, ' ');
                // Capitalize first letter of each word
                collection = collection.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                setCollection(collection);
                // Remove the hashtag from content
                document.getElementById('docContent').innerHTML = content.replace(match[0], '').trim();
                scheduleAutoSave();
            }
        }

        function enterFocusMode() {
            document.body.classList.add('focus-mode');
        }
        function exitFocusMode() {
            document.body.classList.remove('focus-mode');
        }

        // Comprehensive markdown auto-convert
        docContent.addEventListener('keydown', (e) => {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            let node = range.startContainer;

            // Get current block element
            let block = node;
            while (block && block !== docContent && block.parentNode !== docContent) {
                block = block.parentNode;
            }
            if (!block || block === docContent) block = node;

            // Handle Tab for list indentation
            if (e.key === 'Tab') {
                const li = node.closest ? node.closest('li') : null;
                if (li) {
                    e.preventDefault();
                    if (e.shiftKey) {
                        // Outdent - move li to parent's parent list
                        const parentUl = li.parentNode;
                        const grandparentLi = parentUl.parentNode.closest('li');
                        if (grandparentLi) {
                            grandparentLi.parentNode.insertBefore(li, grandparentLi.nextSibling);
                            if (parentUl.children.length === 0) parentUl.remove();
                        }
                    } else {
                        // Indent - nest under previous sibling
                        const prevLi = li.previousElementSibling;
                        if (prevLi) {
                            let nestedUl = prevLi.querySelector('ul');
                            if (!nestedUl) {
                                nestedUl = document.createElement('ul');
                                prevLi.appendChild(nestedUl);
                            }
                            nestedUl.appendChild(li);
                        }
                    }
                    placeCaretIn(li);
                    scheduleAutoSave();
                    return;
                }
            }

            // Handle Enter in lists - continue or exit
            if (e.key === 'Enter') {
                const li = node.closest ? node.closest('li') : (node.parentNode && node.parentNode.closest ? node.parentNode.closest('li') : null);
                if (li && li.textContent.trim() === '') {
                    e.preventDefault();
                    const ul = li.parentNode;
                    const p = document.createElement('p');
                    p.innerHTML = '<br>';
                    ul.parentNode.insertBefore(p, ul.nextSibling);
                    li.remove();
                    if (ul.children.length === 0) ul.remove();
                    placeCaretIn(p);
                    scheduleAutoSave();
                    return;
                }
            }

            // Space triggers markdown conversion
            if (e.key !== ' ') return;

            const text = (block.textContent || '').trimEnd();

            // Patterns to check - capture remaining text after marker
            const patterns = [
                { match: /^#\s(.*)$/, tag: 'h1' },
                { match: /^##\s(.*)$/, tag: 'h2' },
                { match: /^###\s(.*)$/, tag: 'h3' },
                { match: /^####\s(.*)$/, tag: 'h4' },
                { match: /^-(.*)$/, tag: 'ul' },
                { match: /^\*(.*)$/, tag: 'ul' },
                { match: /^1\.(.*)$/, tag: 'ol' },
                { match: /^>(.*)$/, tag: 'blockquote' },
                { match: /^---$/, tag: 'hr' },
                { match: /^```$/, tag: 'pre' },
            ];

            for (const {match, tag} of patterns) {
                const matchResult = text.match(match);
                if (matchResult) {
                    e.preventDefault();
                    // Get remaining text after the marker (trim leading space)
                    const remainingText = matchResult[1] ? matchResult[1].trim() : '';

                    if (tag === 'ul' || tag === 'ol') {
                        const list = document.createElement(tag);
                        const li = document.createElement('li');
                        li.innerHTML = remainingText || '<br>';
                        list.appendChild(li);
                        block.nodeType === 3 ? block.replaceWith(list) : block.replaceWith(list);
                        placeCaretIn(li, remainingText ? 'end' : 'start');
                    } else if (tag === 'hr') {
                        const hr = document.createElement('hr');
                        const p = document.createElement('p');
                        p.innerHTML = '<br>';
                        block.nodeType === 3 ? block.replaceWith(hr) : block.replaceWith(hr);
                        hr.parentNode.insertBefore(p, hr.nextSibling);
                        placeCaretIn(p);
                    } else if (tag === 'pre') {
                        const pre = document.createElement('pre');
                        const code = document.createElement('code');
                        code.innerHTML = '<br>';
                        pre.appendChild(code);
                        block.nodeType === 3 ? block.replaceWith(pre) : block.replaceWith(pre);
                        placeCaretIn(code);
                    } else {
                        const el = document.createElement(tag);
                        el.innerHTML = remainingText || '<br>';
                        block.nodeType === 3 ? block.replaceWith(el) : block.replaceWith(el);
                        placeCaretIn(el, remainingText ? 'end' : 'start');
                    }
                    scheduleAutoSave();
                    return;
                }
            }
        });

        // Handle inline markdown on input (bold, italic, inline code)
        docContent.addEventListener('input', (e) => {
            // Check for hashtag collection
            detectHashtagCollection();

            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const node = selection.anchorNode;
            if (node.nodeType !== 3) return; // Only text nodes

            const text = node.textContent;

            // Inline code: `code`
            const codeMatch = text.match(/`([^`]+)`/);
            if (codeMatch) {
                const before = text.substring(0, codeMatch.index);
                const code = document.createElement('code');
                code.textContent = codeMatch[1];
                const after = text.substring(codeMatch.index + codeMatch[0].length);

                const parent = node.parentNode;
                const frag = document.createDocumentFragment();
                if (before) frag.appendChild(document.createTextNode(before));
                frag.appendChild(code);
                if (after) frag.appendChild(document.createTextNode(after));
                parent.replaceChild(frag, node);

                // Place cursor after
                const range = document.createRange();
                range.setStartAfter(code);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                scheduleAutoSave();
                return;
            }

            // Bold: **text**
            const boldMatch = text.match(/\*\*([^*]+)\*\*/);
            if (boldMatch) {
                const before = text.substring(0, boldMatch.index);
                const strong = document.createElement('strong');
                strong.textContent = boldMatch[1];
                const after = text.substring(boldMatch.index + boldMatch[0].length);

                const parent = node.parentNode;
                const frag = document.createDocumentFragment();
                if (before) frag.appendChild(document.createTextNode(before));
                frag.appendChild(strong);
                if (after) frag.appendChild(document.createTextNode(after));
                parent.replaceChild(frag, node);

                const range = document.createRange();
                range.setStartAfter(strong);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                scheduleAutoSave();
                return;
            }

            // Italic: *text* (but not **)
            const italicMatch = text.match(/(?<!\*)\*([^*]+)\*(?!\*)/);
            if (italicMatch) {
                const before = text.substring(0, italicMatch.index);
                const em = document.createElement('em');
                em.textContent = italicMatch[1];
                const after = text.substring(italicMatch.index + italicMatch[0].length);

                const parent = node.parentNode;
                const frag = document.createDocumentFragment();
                if (before) frag.appendChild(document.createTextNode(before));
                frag.appendChild(em);
                if (after) frag.appendChild(document.createTextNode(after));
                parent.replaceChild(frag, node);

                const range = document.createRange();
                range.setStartAfter(em);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                scheduleAutoSave();
                return;
            }
        });

        function placeCaretIn(el, position = 'start') {
            const range = document.createRange();
            const sel = window.getSelection();
            if (position === 'end' && el.firstChild) {
                // Place caret at end of content
                const textNode = el.lastChild || el;
                const offset = textNode.nodeType === 3 ? textNode.length : 0;
                range.setStart(textNode, offset);
            } else if (el.firstChild) {
                range.setStart(el.firstChild, 0);
            } else {
                range.selectNodeContents(el);
            }
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
            el.focus();
        }

                    docOpenedFromCollection = null;

                if (collectionFilter || timelineSearchQuery) {

        // Click on sidebar item exits focus mode

        document.addEventListener('click', (e) => {

        // Keyboard shortcuts - MUST check metaKey/ctrlKey FIRST
        document.addEventListener('keydown', (e) => {
            // Only trigger on Cmd/Ctrl + key
            if (!(e.metaKey || e.ctrlKey)) {
                // Escape is handled by the dedicated Escape handler above
                return;
            }

            // Now we know Cmd/Ctrl is held
            if (e.key === 's') { e.preventDefault(); saveDoc(); }
            else if (e.key === 'n') { e.preventDefault(); newDoc(); }
            else if (e.key === 'b') { e.preventDefault(); document.execCommand('bold'); scheduleAutoSave(); }
            else if (e.key === 'i') { e.preventDefault(); document.execCommand('italic'); scheduleAutoSave(); }
            else if (e.key === 'k') { e.preventDefault(); openQuickSearch(); }
        });

        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            const d = new Date(dateStr);
            const diff = Date.now() - d;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff/86400000)}d ago`;
            return d.toLocaleDateString();
        }

        function filterQuickSearch() {
            const query = document.getElementById('quickSearchInput').value.toLowerCase().trim();
            const container = document.getElementById('quickSearchResults');

            // Use allDocsCache for searching
            let results = allDocsCache || [];
            
            if (query) {
                results = results.filter(doc => 
                    (doc.title || '').toLowerCase().includes(query) ||
                    (doc.collection || '').toLowerCase().includes(query)
                );
            }

            // Sort by most recently updated
            results = results.slice().sort((a, b) => 
                new Date(b.updated_at || 0) - new Date(a.updated_at || 0)
            ).slice(0, 15); // Limit to 15 results

            quickSearchResults = results;
            quickSearchSelectedIndex = 0;

            if (results.length === 0) {
                container.innerHTML = '<div class="quick-search-empty">No documents found</div>';
                return;
            }

            container.innerHTML = results.map((doc, i) => `
                <div class="quick-search-item ${i === 0 ? 'selected' : ''}" 
                     data-doc-id="${doc.id}" 
                     onclick="selectQuickSearchDoc('${doc.id}')">
