<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Designer - OrchestrateOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --border: #2d2d2d;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #666666;
            --accent: #FF6B35;
            --accent-hover: #ff8555;
            --success: #10b981;
            --error: #ef4444;
            /* Theme variables - updated per deck */
            --theme-bg: #1A1A1A;
            --theme-surface: #2D2D2D;
            --theme-text: #FFFFFF;
            --theme-text-secondary: #AAAAAA;
            --theme-accent: #FF6B35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions { display: flex; gap: 12px; align-items: center; }

        .back-btn {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .back-btn:hover { background: var(--surface-hover); color: var(--text); }
        .back-btn.visible { display: flex; }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

        /* HOME VIEW - Deck Grid */
        .home-view {
            padding: 40px;
            display: none;
        }
        .home-view.active { display: block; }

        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .home-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .new-deck-btn-home {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
        }
        .new-deck-btn-home:hover { background: var(--accent-hover); }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .deck-card-home {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }
        .deck-card-home:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

        .deck-card-thumbnail {
            aspect-ratio: 16/9;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 48px;
            border-bottom: 1px solid var(--border);
        }

        .deck-card-info {
            padding: 16px;
        }

        .deck-card-title-home {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .deck-card-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .deck-card-home { position: relative; }
        .deck-card-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(0,0,0,0.6);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: all 0.2s;
        }
        .deck-card-home:hover .deck-card-delete { opacity: 1; }
        .deck-card-delete:hover { background: var(--error); color: white; }

        /* DECK VIEW - Editor */
        .deck-view {
            display: none;
            height: calc(100vh - 65px);
        }
        .deck-view.active { display: flex; }

        .sidebar {
            width: 200px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 { font-size: 14px; font-weight: 600; }

        .slide-list { flex: 1; overflow-y: auto; padding: 12px; }

        .slide-thumbnail {
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .slide-thumbnail:hover { border-color: var(--border); }
        .slide-thumbnail.active { border-color: var(--accent); }
        .slide-thumbnail-ghost { opacity: 0.4; background: var(--accent); }

        .slide-thumbnail-preview {
            aspect-ratio: 16/9;
            background: var(--theme-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .slide-thumbnail-content {
            width: 100%;
            height: 100%;
            transform: scale(0.15);
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            width: 666.67%;
            height: 666.67%;
        }

        .slide-thumbnail-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-number { font-weight: 600; color: var(--text-muted); }

        .slide-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
        .slide-thumbnail:hover .slide-actions { opacity: 1; }

        .slide-action-btn {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            border: none;
            background: var(--surface-hover);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .slide-action-btn:hover { background: var(--border); color: var(--text); }
        .slide-action-btn.delete:hover { background: var(--error); color: white; }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }

        .canvas-toolbar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .zoom-controls { display: flex; align-items: center; gap: 8px; }

        .zoom-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover { background: var(--surface-hover); }
        .zoom-level { font-size: 12px; color: var(--text-secondary); min-width: 40px; text-align: center; }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: auto;
            position: relative;
        }

        /* Navigation arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
            transition: all 0.15s;
        }
        .nav-arrow:hover { background: var(--surface-hover); border-color: var(--accent); }
        .nav-arrow.disabled { opacity: 0.3; pointer-events: none; }
        .nav-arrow.prev { left: 20px; }
        .nav-arrow.next { right: 20px; }

        .slide-canvas {
            width: 960px;
            height: 540px;
            background: var(--theme-bg);
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            transform-origin: center center;
            overflow: hidden;
        }

        [contenteditable] {
            outline: none;
            cursor: text;
            transition: background 0.15s;
            border-radius: 4px;
        }

        [contenteditable]:hover { background: rgba(255,255,255,0.05); }
        [contenteditable]:focus { background: rgba(255,107,53,0.1); box-shadow: inset 0 0 0 2px var(--accent); }
        [contenteditable][data-placeholder]:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events: none; }

        .icon-slot {
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 8px;
            padding: 8px;
        }

        .icon-slot:hover { background: rgba(255,255,255,0.1); }
        .icon-slot svg { width: 100%; height: 100%; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            max-width: 900px;
            max-height: 80vh;
            width: 90%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 18px; font-weight: 600; }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .modal-close:hover { background: var(--surface-hover); color: var(--text); }
        .modal-body { padding: 24px; overflow-y: auto; }

        .layout-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

        .layout-card {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .layout-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .layout-preview {
            aspect-ratio: 16/9;
            background: var(--surface);
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .layout-preview-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        .layout-name { font-size: 12px; font-weight: 500; color: var(--text); text-align: center; }

        .lp-title-hero .layout-preview-content { align-items: center; justify-content: center; }
        .lp-title-hero .lp-headline { width: 60%; height: 12px; background: var(--text-muted); border-radius: 2px; margin-bottom: 6px; }
        .lp-title-hero .lp-subtitle { width: 40%; height: 6px; background: var(--border); border-radius: 2px; }

        .lp-split .layout-preview-content { flex-direction: row; }
        .lp-split .lp-left, .lp-split .lp-right { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 6px; }
        .lp-split .lp-text-block { width: 80%; height: 4px; background: var(--border); border-radius: 1px; margin-bottom: 3px; }
        .lp-split .lp-image-block { background: var(--accent); opacity: 0.3; border-radius: 2px; flex: 1; }

        .lp-three-col .layout-preview-content { flex-direction: row; gap: 4px; padding: 8px; }
        .lp-three-col .lp-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .lp-three-col .lp-icon { width: 12px; height: 12px; background: var(--accent); opacity: 0.5; border-radius: 2px; }
        .lp-three-col .lp-title { width: 80%; height: 3px; background: var(--text-muted); border-radius: 1px; }
        .lp-three-col .lp-body { width: 100%; height: 2px; background: var(--border); border-radius: 1px; }

        .lp-big-number .layout-preview-content { align-items: center; justify-content: center; }
        .lp-big-number .lp-number { font-size: 24px; font-weight: 800; color: var(--accent); }
        .lp-big-number .lp-label { width: 40px; height: 4px; background: var(--border); border-radius: 1px; margin-top: 4px; }

        .lp-quote .layout-preview-content { align-items: center; justify-content: center; padding: 12px; }
        .lp-quote .lp-quote-mark { font-size: 20px; color: var(--accent); opacity: 0.5; }
        .lp-quote .lp-quote-line { width: 80%; height: 3px; background: var(--border); border-radius: 1px; margin: 3px 0; }

        .lp-bullets .layout-preview-content { padding: 8px; }
        .lp-bullets .lp-title-line { width: 50%; height: 5px; background: var(--text-muted); border-radius: 1px; margin-bottom: 6px; }
        .lp-bullets .lp-bullet { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
        .lp-bullets .lp-bullet-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
        .lp-bullets .lp-bullet-text { flex: 1; height: 3px; background: var(--border); border-radius: 1px; }

        .lp-stats .layout-preview-content { flex-direction: row; align-items: center; justify-content: space-around; padding: 12px; }
        .lp-stats .lp-stat { display: flex; flex-direction: column; align-items: center; }
        .lp-stats .lp-stat-num { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .lp-stats .lp-stat-label { width: 20px; height: 2px; background: var(--border); border-radius: 1px; margin-top: 2px; }

        .lp-image-full .layout-preview-content { padding: 0; }
        .lp-image-full .lp-image { width: 100%; height: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--surface) 100%); opacity: 0.3; }

        .icon-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; max-height: 400px; overflow-y: auto; }

        .icon-option {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            padding: 12px;
        }

        .icon-option:hover { border-color: var(--accent); background: var(--surface-hover); }
        .icon-option svg { width: 24px; height: 24px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .icon-search {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .icon-search:focus { outline: none; border-color: var(--accent); }

        /* Slide content styles - use theme variables */
        .slide-content {
            width: 100%;
            height: 100%;
            padding: 48px;
            display: flex;
            flex-direction: column;
            color: var(--theme-text);
        }

        /* Centered layouts container */
        .slide-content.centered {
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }

        .slide-headline { font-size: 48px; font-weight: 700; color: var(--theme-text); text-align: center; padding: 8px; }
        .slide-subtitle { font-size: 24px; font-weight: 400; color: var(--theme-text-secondary); text-align: center; margin-top: 12px; padding: 8px; }
        .slide-body { font-size: 18px; line-height: 1.6; color: var(--theme-text-secondary); padding: 8px; }
        .slide-section-title { font-size: 32px; font-weight: 600; color: var(--theme-text); padding: 8px; }
        .slide-big-number { font-size: 96px; font-weight: 800; color: var(--theme-accent); text-align: center; padding: 8px; }
        .slide-stat-label { font-size: 18px; color: var(--theme-text-secondary); text-align: center; padding: 4px; }
        .slide-quote { font-size: 28px; font-style: italic; color: var(--theme-text); text-align: center; padding: 16px; line-height: 1.5; }
        .slide-quote::before { content: '"'; font-size: 48px; color: var(--theme-accent); display: block; margin-bottom: 8px; }
        .slide-quote::after { content: '"'; font-size: 48px; color: var(--theme-accent); display: block; margin-top: 8px; }
        .slide-author { font-size: 16px; color: var(--theme-text-secondary); text-align: center; margin-top: 16px; padding: 4px; }

        .slide-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 32px; flex: 1; }
        .slide-grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 32px; flex: 1; }
        .slide-grid-item { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 16px; min-height: 150px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .slide-item-icon { width: 48px; height: 48px; min-width: 48px; min-height: 48px; margin-bottom: 12px; color: var(--theme-accent); display: flex; align-items: center; justify-content: center; }
        .slide-item-title { font-size: 18px; font-weight: 600; color: var(--theme-text); padding: 4px; margin-bottom: 4px; min-height: 1.5em; }
        .slide-item-body { font-size: 14px; color: var(--theme-text-secondary); padding: 4px; min-height: 1em; }

        .slide-split { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; height: 100%; }
        .slide-split-content { display: flex; flex-direction: column; justify-content: center; }
        .slide-split-image { background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }

        .slide-stats-row { display: flex; justify-content: space-around; align-items: center; flex: 1; }
        .slide-stat-item { text-align: center; }
        .slide-stat-number { font-size: 56px; font-weight: 800; color: var(--theme-accent); padding: 4px; }

        .slide-bullets { list-style: none; padding: 0; margin-top: 24px; }
        .slide-bullets li { font-size: 20px; color: var(--theme-text-secondary); padding: 8px 8px 8px 32px; position: relative; margin-bottom: 8px; }
        .slide-bullets li::before { content: ''; position: absolute; left: 8px; top: 18px; width: 8px; height: 8px; background: var(--theme-accent); border-radius: 50%; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-text { font-size: 16px; margin-bottom: 24px; }

        /* Floating Add Slide Button */
        .fab-add-slide {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
            transition: all 0.2s;
            z-index: 100;
        }
        .fab-add-slide:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(255, 107, 53, 0.5); }

        /* Present Mode */
        .present-mode {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .present-mode.active { display: flex; }

        .present-slide {
            width: 100vw;
            height: 56.25vw; /* 16:9 */
            max-height: 100vh;
            max-width: calc(100vh * 16 / 9);
            background: var(--theme-bg);
            position: relative;
            overflow: hidden;
        }

        .present-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .present-mode:hover .present-nav { opacity: 1; }
        .present-nav-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .present-nav-btn:hover { background: rgba(255,255,255,0.3); }
        .present-counter {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            min-width: 60px;
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--error); }

        .saving-indicator { display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
        .saving-indicator.active { display: flex; }
        .saving-spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .deck-modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            width: 360px;
        }

        .deck-modal h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        .deck-modal-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .deck-modal-input:focus { outline: none; border-color: var(--accent); }

        .deck-modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* Font Pairing Dropdown */
        .font-pairing-select {
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            display: none;
        }
        .font-pairing-select:hover { border-color: var(--accent); }
        .font-pairing-select:focus { outline: none; border-color: var(--accent); }

        /* Font pairing CSS variables */
        .font-classic { --heading-font: 'Inter', sans-serif; --body-font: 'Inter', sans-serif; }
        .font-editorial { --heading-font: 'Playfair Display', serif; --body-font: 'Inter', sans-serif; }
        .font-technical { --heading-font: 'JetBrains Mono', monospace; --body-font: 'Inter', sans-serif; }
        .font-humanist { --heading-font: 'Lora', serif; --body-font: 'Source Sans Pro', sans-serif; }

        /* Apply font pairing to slide content */
        .slide-headline, .slide-section-title, .slide-big-number, .slide-item-title {
            font-family: var(--heading-font);
        }
        .slide-subtitle, .slide-body, .slide-item-body, .slide-stat-label, .slide-quote, .slide-author {
            font-family: var(--body-font);
        }

        /* Floating Mini-Toolbar */
        .text-toolbar {
            position: fixed;
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 500;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 240px;
        }
        .text-toolbar.visible { display: flex; }
        .text-toolbar-btn {
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .text-toolbar-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
        .text-toolbar-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .text-toolbar-divider { width: 1px; background: var(--border); margin: 0 4px; align-self: stretch; }

        /* Text style classes */
        .text-style-heading { font-size: 48px !important; font-weight: 700 !important; font-family: var(--heading-font) !important; }
        .text-style-subheading { font-size: 28px !important; font-weight: 500 !important; font-family: var(--heading-font) !important; }
        .text-style-body { font-size: 18px !important; font-weight: 400 !important; font-family: var(--body-font) !important; }
        .text-style-bold { font-weight: 700 !important; }
        .text-style-italic { font-style: italic !important; }

        /* Color Swatches Popup */
        .color-swatch-popup {
            position: fixed;
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 600;
            gap: 6px;
        }
        .color-swatch-popup.visible { display: flex; }
        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }
        .color-swatch:hover { transform: scale(1.15); }
        .color-swatch.active { border-color: white; box-shadow: 0 0 0 2px var(--accent); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <header class="header">
        <h1>
            <button class="back-btn" id="backBtn" onclick="goToHome()">

        <div class="header-actions">
            <div class="saving-indicator" id="savingIndicator">

            <select class="btn btn-secondary" id="themeSelector" onchange="applyTheme(this.value)" style="display: none;">
                <option value="dark_pro">Dark Pro</option>
                <option value="light_corporate">Light Corporate</option>
                <option value="startup_bold">Startup Bold</option>

                <option value="tech_neon">Tech Neon</option>

                Export

                </svg>

            </button>
        </div>
    </header>

    <!-- HOME VIEW - Deck Grid -->
    <div class="home-view active" id="homeView">
        <div class="home-header">
            <h2>Your Decks</h2>
            <button class="new-deck-btn-home" onclick="openNewDeckModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Deck
            </button>
        </div>
        <div class="deck-grid" id="deckGrid"></div>
    </div>

    <!-- DECK VIEW - Editor -->
    <div class="deck-view" id="deckView">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Slides</h2>
            </div>
            <div class="slide-list" id="slideList"></div>
        </aside>

        <main class="canvas-area">
            <div class="canvas-toolbar">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomOut()">-</button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                </div>
                <span id="slideInfo" style="font-size: 12px; color: var(--text-muted);"></span>
            </div>
            <div class="canvas-wrapper">
                <button class="nav-arrow prev" id="prevSlideBtn" onclick="prevSlide()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="slide-canvas" id="slideCanvas">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">Slides</div>
                        <div class="empty-state-text">Click + to add your first slide</div>

                </div>
                <button class="nav-arrow next" id="nextSlideBtn" onclick="nextSlide()">

    <!-- Layout Picker Modal -->
    <div class="modal-overlay" id="layoutPickerModal">

            </div>
        </div>
    </div>

    <!-- Icon Picker Modal -->
    <div class="modal-overlay" id="iconPickerModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Choose an Icon</h2>
                <button class="modal-close" onclick="closeIconPicker()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" class="icon-search" id="iconSearch" placeholder="Search icons..." oninput="filterIcons(this.value)">
                <div class="icon-grid" id="iconGrid"></div>
            </div>
        </div>
    </div>

    <!-- New Deck Modal -->
    <div class="modal-overlay" id="newDeckModal">
        <div class="deck-modal">
            <h3>Create New Deck</h3>
            <input type="text" class="deck-modal-input" id="newDeckTitle" placeholder="Deck title..." onkeydown="if(event.key==='Enter')confirmNewDeck()">
            <div class="deck-modal-actions">
                <button class="btn btn-secondary" onclick="closeNewDeckModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmNewDeck()">Create</button>
            </div>

    <!-- Present Mode -->
    <div class="present-mode" id="presentMode">
        <div class="present-slide" id="presentSlide"></div>
        <div class="present-nav">
            <button class="present-nav-btn" onclick="prevSlide()">&#8592;</button>
            <span class="present-counter" id="presentCounter">1 / 1</span>
            <button class="present-nav-btn" onclick="nextSlide()">&#8594;</button>
        </div>
        <button class="present-exit" onclick="exitPresent()">ESC to exit</button>
    </div>

    <div class="toast" id="toast"><span id="toastMessage"></span></div>

    <!-- Floating Text Toolbar -->
    <div class="text-toolbar" id="textToolbar">
        <button class="text-toolbar-btn" onclick="applyTextStyle('heading')" title="Heading">H1</button>
        <button class="text-toolbar-btn" onclick="applyTextStyle('subheading')" title="Subheading">H2</button>
        <button class="text-toolbar-btn" onclick="applyTextStyle('body')" title="Body">P</button>
        <div class="text-toolbar-divider"></div>
        <button class="text-toolbar-btn" onclick="toggleTextStyle('bold')" id="boldBtn" title="Bold"><b>B</b></button>
        <button class="text-toolbar-btn" onclick="toggleTextStyle('italic')" id="italicBtn" title="Italic"><i>I</i></button>
        <div class="text-toolbar-divider"></div>
        <button class="text-toolbar-btn" onclick="openTextColorSwatches()" title="Text Color">A</button>
    </div>

    <!-- Color Swatch Popup for Text -->
    <div class="color-swatch-popup" id="textColorSwatches"></div>

    <!-- Color Swatch Popup for Icons -->
    <div class="color-swatch-popup" id="iconColorSwatches"></div>

    <script>
        let currentDeck = null;
        let currentDeckData = null;
        let currentSlide = null;
        let currentSlideIndex = 0;
        let slides = [];
        let layouts = [];
        let icons = {};
        let themes = {};
        let zoomLevel = 100;
        let saveTimeout = null;
        let activeIconSlot = null;
        let allDecks = [];
        let isPresentMode = false;

        const layoutPreviews = {
            title_hero: { class: 'lp-title-hero', html: '<div class="lp-headline"></div><div class="lp-subtitle"></div>' },
            title_with_image: { class: 'lp-image-full', html: '<div class="lp-image"></div>' },
            split_content: { class: 'lp-split', html: '<div class="lp-left"><div class="lp-text-block"></div><div class="lp-text-block"></div></div><div class="lp-right"><div class="lp-image-block"></div></div>' },
            split_content_reverse: { class: 'lp-split', html: '<div class="lp-left"><div class="lp-image-block"></div></div><div class="lp-right"><div class="lp-text-block"></div><div class="lp-text-block"></div></div>' },
            three_column: { class: 'lp-three-col', html: '<div class="lp-col"><div class="lp-icon"></div><div class="lp-title"></div></div><div class="lp-col"><div class="lp-icon"></div><div class="lp-title"></div></div><div class="lp-col"><div class="lp-icon"></div><div class="lp-title"></div></div>' },
            four_grid: { class: 'lp-three-col', html: '<div class="lp-col"><div class="lp-icon"></div></div><div class="lp-col"><div class="lp-icon"></div></div><div class="lp-col"><div class="lp-icon"></div></div><div class="lp-col"><div class="lp-icon"></div></div>' },
            big_number: { class: 'lp-big-number', html: '<div class="lp-number">99</div><div class="lp-label"></div>' },
            stats_row: { class: 'lp-stats', html: '<div class="lp-stat"><div class="lp-stat-num">10</div></div><div class="lp-stat"><div class="lp-stat-num">25</div></div><div class="lp-stat"><div class="lp-stat-num">50</div></div>' },
            quote: { class: 'lp-quote', html: '<div class="lp-quote-mark">"</div><div class="lp-quote-line"></div><div class="lp-quote-line"></div>' },
            text_only: { class: 'lp-bullets', html: '<div class="lp-title-line"></div><div class="lp-bullet"><div class="lp-bullet-text" style="width:100%"></div></div>' },
            bullet_list: { class: 'lp-bullets', html: '<div class="lp-title-line"></div><div class="lp-bullet"><div class="lp-bullet-dot"></div><div class="lp-bullet-text"></div></div><div class="lp-bullet"><div class="lp-bullet-dot"></div><div class="lp-bullet-text"></div></div>' },
            numbered_steps: { class: 'lp-bullets', html: '<div class="lp-title-line"></div><div class="lp-bullet"><div class="lp-bullet-dot" style="border-radius:0"></div><div class="lp-bullet-text"></div></div>' },
            timeline_horizontal: { class: 'lp-stats', html: '<div class="lp-stat"><div class="lp-stat-label" style="width:8px;height:8px;border-radius:50%"></div></div><div style="flex:1;height:2px;background:var(--border)"></div><div class="lp-stat"><div class="lp-stat-label" style="width:8px;height:8px;border-radius:50%"></div></div>' },
            image_full: { class: 'lp-image-full', html: '<div class="lp-image"></div>' },
            image_gallery: { class: 'lp-three-col', html: '<div class="lp-col" style="background:var(--accent);opacity:0.2;border-radius:2px"></div><div class="lp-col" style="background:var(--accent);opacity:0.2;border-radius:2px"></div><div class="lp-col" style="background:var(--accent);opacity:0.2;border-radius:2px"></div>' },
            chart_single: { class: 'lp-split', html: '<div class="lp-left"><div class="lp-text-block"></div></div><div class="lp-right"><div class="lp-image-block" style="background:var(--accent);opacity:0.3"></div></div>' },
            comparison_table: { class: 'lp-three-col', html: '<div class="lp-col" style="border-right:1px solid var(--border)"><div class="lp-title"></div></div><div class="lp-col" style="border-right:1px solid var(--border)"><div class="lp-title"></div></div><div class="lp-col"><div class="lp-title"></div></div>' },
            team_grid: { class: 'lp-three-col', html: '<div class="lp-col"><div class="lp-icon" style="border-radius:50%;width:16px;height:16px"></div><div class="lp-title"></div></div><div class="lp-col"><div class="lp-icon" style="border-radius:50%"></div><div class="lp-title"></div></div>' },
            logo_grid: { class: 'lp-three-col', html: '<div class="lp-col"><div class="lp-icon"></div></div><div class="lp-col"><div class="lp-icon"></div></div><div class="lp-col"><div class="lp-icon"></div></div>' },
            cta_closing: { class: 'lp-title-hero', html: '<div class="lp-headline"></div><div class="lp-subtitle"></div><div style="width:40px;height:12px;background:var(--accent);border-radius:2px;margin-top:8px"></div>' },
            section_divider: { class: 'lp-big-number', html: '<div class="lp-number" style="font-size:16px">01</div><div class="lp-label" style="width:60px"></div>' },
            headline: { class: 'lp-title-hero', html: '<div class="lp-headline"></div>' },
            section_break: { class: 'lp-big-number', html: '<div class="lp-label" style="width:80px;height:8px"></div>' },
            agenda: { class: 'lp-bullets', html: '<div class="lp-title-line"></div><div class="lp-bullet"><div class="lp-bullet-dot" style="background:var(--text-muted)"></div><div class="lp-bullet-text"></div></div>' },
            icon_list: { class: 'lp-three-col', html: '<div class="lp-col" style="flex-direction:row;gap:4px"><div class="lp-icon"></div><div style="flex:1"><div class="lp-title"></div></div></div>' },
            video_embed: { class: 'lp-image-full', html: '<div class="lp-image" style="display:flex;align-items:center;justify-content:center"><div style="width:20px;height:20px;border:2px solid var(--text-muted);border-radius:50%"></div></div>' }
        };

        // Layouts that should be centered
        const centeredLayouts = ['title_hero', 'headline', 'quote', 'big_number', 'section_break', 'section_divider', 'cta_closing'];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadLayouts();
            await loadIcons();
            await loadThemes();
            await loadDecks();
            renderLayoutGrid();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (isPresentMode) {
                if (e.key === 'Escape') exitPresent();
                else if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                else if (e.key === 'ArrowLeft') prevSlide();
                return;
            }
            // Only nav when not editing
            if (document.activeElement.contentEditable !== 'true' && currentDeck) {
                if (e.key === 'ArrowRight') nextSlide();
                else if (e.key === 'ArrowLeft') prevSlide();
            }
        });

        async function apiCall(toolName, action, params = {}) {
            const response = await fetch('/execute_task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tool_name: toolName, action: action, params: params })
            });
            return response.json();
        }

        async function loadLayouts() {
            try {
                const response = await fetch('/data/slide_designer_layouts.json');
                const data = await response.json();
                layouts = data.layouts || [];
            } catch (e) { layouts = []; }
        }

        async function loadIcons() {
            try {
                const response = await fetch('/data/lucide_icons.json');
                if (!response.ok) { console.error('loadIcons failed:', response.status); icons = {}; return; }
                const data = await response.json();
                icons = data.icons || data || {};
                console.log('Icons loaded:', Object.keys(icons).length, 'icons');
            } catch (e) { console.error('loadIcons error:', e); icons = {}; }
        }

        async function loadThemes() {
            try {
                const response = await fetch('/data/slide_themes.json');
                if (!response.ok) { console.error('loadThemes failed:', response.status); themes = {}; return; }
                const data = await response.json();
                themes = data.themes || {};
                console.log('Themes loaded:', Object.keys(themes).length, 'themes');
            } catch (e) { console.error('loadThemes error:', e); themes = {}; }
        }

        async function loadDecks() {
            const result = await apiCall('slide_designer', 'list_decks', {});
            if (result.status === 'success' && result.decks) {
                allDecks = result.decks;
                renderDeckGrid();
            }
        }

        function renderDeckGrid() {
            const container = document.getElementById('deckGrid');
            if (allDecks.length === 0) {
                container.innerHTML = '<div style="grid-column: span 3; text-align: center; padding: 80px 20px; color: var(--text-muted);"><div style="font-size: 64px; margin-bottom: 16px; opacity: 0.3;">Slides</div><div style="font-size: 16px;">Create your first deck to get started</div></div>';
                return;
            }
            container.innerHTML = allDecks.map(deck => {
                const slideCount = deck.slide_count || 0;
                const lastEdited = deck.updated_at ? formatDate(deck.updated_at) : 'Just now';
                return `<div class="deck-card-home" onclick="openDeck('${deck.id}')">
                    <button class="deck-card-delete" onclick="event.stopPropagation(); deleteDeck('${deck.id}', '${escapeHtml(deck.title)}')" title="Delete deck">&times;</button>
                    <div class="deck-card-thumbnail">${slideCount > 0 ? slideCount : 'Slides'}</div>
                    <div class="deck-card-info">
                        <div class="deck-card-title-home">${escapeHtml(deck.title)}</div>
                        <div class="deck-card-meta">
                            <span>${slideCount} slide${slideCount !== 1 ? 's' : ''}</span>
                            <span>${lastEdited}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Just now';
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            return d.toLocaleDateString();
        }

        async function openDeck(deckId) {
            currentDeck = deckId;
            const result = await apiCall('slide_designer', 'get_deck', { deck_id: deckId });
            if (result.status === 'success') {
                currentDeckData = result.deck;
                slides = (result.deck && result.deck.slides) ? result.deck.slides : [];

                // Apply theme
                const themeName = result.deck.theme || 'dark_pro';
                // Update theme selector to match deck theme
                const themeSelector = document.getElementById('themeSelector');
                if (themeSelector) themeSelector.value = themeName;
                // Ensure themes are loaded before applying
                if (Object.keys(themes).length === 0) {
                    await loadThemes();
                }
                applyTheme(themeName);

                // Switch to deck view
                document.getElementById('homeView').classList.remove('active');
                document.getElementById('deckView').classList.add('active');
                document.getElementById('backBtn').classList.add('visible');
                document.getElementById('headerTitle').textContent = result.deck.title || 'Untitled Deck';
                document.getElementById('exportBtn').style.display = 'flex';
                document.getElementById('presentBtn').style.display = 'flex';
                document.getElementById('themeSelector').style.display = 'block';
                document.getElementById('fontPairingSelector').style.display = 'block';
                
                // Apply saved font pairing
                const fontPairing = result.deck.font_pairing || 'classic';
                document.getElementById('fontPairingSelector').value = fontPairing;
                applyFontPairing(fontPairing);

                renderSlideList();
                if (slides.length > 0) {
                    currentSlideIndex = 0;
                    selectSlide(slides[0].id);
                } else {
                    showEmptyState();
                }
                updateNavArrows();
            }
        }

        function applyTheme(themeName) {
            const theme = themes[themeName] || themes['dark_pro'];
            if (!theme) return;

            const root = document.documentElement;
            const canvas = document.getElementById('slideCanvas');
            const presentSlide = document.getElementById('presentSlide');

            if (theme.css_vars) {
                Object.entries(theme.css_vars).forEach(([key, value]) => {
                    root.style.setProperty(key, value);
                });
                if (canvas) {
                    Object.entries(theme.css_vars).forEach(([key, value]) => {
                        canvas.style.setProperty(key, value);
                    });
                    canvas.style.background = theme.css_vars['--theme-bg'] || '#1A1A1A';
                }
                if (presentSlide) {
                    Object.entries(theme.css_vars).forEach(([key, value]) => {
                        presentSlide.style.setProperty(key, value);
                    });
                    presentSlide.style.background = theme.css_vars['--theme-bg'] || '#1A1A1A';
                }
            }
            if (isPresentMode) {
                renderPresentSlide();
            } else if (currentSlide) {
                renderSlideCanvas();
            }
        }

        function goToHome() {
            currentDeck = null;
            currentDeckData = null;
            currentSlide = null;
            slides = [];

            document.getElementById('deckView').classList.remove('active');
            document.getElementById('homeView').classList.add('active');
            document.getElementById('backBtn').classList.remove('visible');
            document.getElementById('headerTitle').innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg> Slide Designer';
            document.getElementById('exportBtn').style.display = 'none';
            document.getElementById('presentBtn').style.display = 'none';
            document.getElementById('fontPairingSelector').style.display = 'none';
            document.getElementById('themeSelector').style.display = 'none';

            loadDecks();
        }

        function openNewDeckModal() {
            document.getElementById('newDeckModal').classList.add('active');
            document.getElementById('newDeckTitle').value = '';
            document.getElementById('newDeckTitle').focus();
        }

        function closeNewDeckModal() {
            document.getElementById('newDeckModal').classList.remove('active');
        }

        async function confirmNewDeck() {
            const title = document.getElementById('newDeckTitle').value.trim();
            if (!title) return;
            closeNewDeckModal();
            const result = await apiCall('slide_designer', 'create_deck', { title: title });
            if (result.status === 'success') {
                await loadDecks();
                await openDeck(result.deck_id);
                showToast('Deck created', 'success');
            }
        }

        function renderSlideList() {
            const container = document.getElementById('slideList');
            if (slides.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px;">No slides yet</div>';
                return;
            }
            container.innerHTML = slides.map((slide, idx) => {
                const isActive = currentSlide && currentSlide.id === slide.id;
                const thumbnailContent = renderSlideForThumbnail(slide);
                return `<div class="slide-thumbnail ${isActive ? 'active' : ''}" data-id="${slide.id}" onclick="selectSlide('${slide.id}')">
                    <div class="slide-thumbnail-preview">
                        <div class="slide-thumbnail-content">${thumbnailContent}</div>
                    </div>
                    <div class="slide-thumbnail-label">
                        <span class="slide-number">${idx + 1}</span>
                        <div class="slide-actions">
                            <button class="slide-action-btn delete" onclick="event.stopPropagation(); deleteSlide('${slide.id}')" title="Delete">×</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            initSortable();
        }
        
        let sortableInstance = null;
        function initSortable() {
            const container = document.getElementById('slideList');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(container, {
                animation: 150,
                ghostClass: 'slide-thumbnail-ghost',
                onEnd: async function(evt) {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    if (oldIndex === newIndex) return;
                    // Reorder slides array
                    const movedSlide = slides.splice(oldIndex, 1)[0];
                    slides.splice(newIndex, 0, movedSlide);
                    // Update currentSlideIndex
                    if (currentSlide) {
                        currentSlideIndex = slides.findIndex(s => s.id === currentSlide.id);
                    }
                    // Save new order to backend
                    const slideIds = slides.map(s => s.id);
                    await apiCall('slide_designer', 'reorder_slides', { deck_id: currentDeck, slide_ids: slideIds });
                    renderSlideList();
                    updateNavArrows();
                }
            });
        }

        function renderSlideForThumbnail(slide) {
            const layout = slide.layout_type;
            const content = slide.content || {};
            const isCentered = centeredLayouts.includes(layout);
            let html = `<div class="slide-content ${isCentered ? 'centered' : ''}">`;

            // Simplified rendering for thumbnails
            if (layout === 'title_hero') {
                html += `<div class="slide-headline">${escapeHtml(content.headline || 'Headline')}</div>
                    <div class="slide-subtitle">${escapeHtml(content.subtitle || 'Subtitle')}</div>`;
            } else if (layout === 'big_number') {
                html += `<div class="slide-big-number">${escapeHtml(content.number || '0')}</div>
                    <div class="slide-stat-label">${escapeHtml(content.label || 'Label')}</div>`;
            } else if (layout === 'quote') {
                html += `<div class="slide-quote">${escapeHtml(content.quote_text || 'Quote')}</div>`;
            } else {
                html += `<div class="slide-section-title">${escapeHtml(content.title || content.header || layout)}</div>`;
            }

            html += '</div>';
            return html;
        }

        async function selectSlide(slideId) {
            const idx = slides.findIndex(s => s.id === slideId);
            if (idx < 0) return;
            currentSlideIndex = idx;
            currentSlide = slides[idx];
            renderSlideList();
            renderSlideCanvas();
            document.getElementById('slideInfo').textContent = `Slide ${idx + 1} of ${slides.length}`;
            updateNavArrows();
        }

        function updateNavArrows() {
            const prevBtn = document.getElementById('prevSlideBtn');
            const nextBtn = document.getElementById('nextSlideBtn');
            prevBtn.classList.toggle('disabled', currentSlideIndex <= 0);
            nextBtn.classList.toggle('disabled', currentSlideIndex >= slides.length - 1);
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                if (isPresentMode) {
                    renderPresentSlide();
                } else {
                    selectSlide(slides[currentSlideIndex].id);
                }
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                if (isPresentMode) {
                    renderPresentSlide();
                } else {
                    selectSlide(slides[currentSlideIndex].id);
                }
            }
        }

            document.getElementById('emptyState').style.display = 'flex';

            document.getElementById('slideInfo').textContent = '';

                '</div>';
            } else if (layout === 'numbered_steps') {
                const steps = slideContent.steps || ['Step 1', 'Step 2', 'Step 3'];
                html += '<div class="slide-section-title" contenteditable="true" data-field="title" data-placeholder="Click to edit title" onblur="saveField(this)">' + escapeHtml(slideContent.title || '') + '</div>' +
                    '<div style="margin-top:32px; display:flex; flex-direction:column; gap:20px;">';
                steps.forEach((step, i) => {
                    html += '<div style="display:flex; align-items:flex-start; gap:16px;">' +

                        '<div contenteditable="true" data-field="steps" data-index="' + i + '" style="flex:1; font-size:18px; padding-top:8px;" onblur="saveBullet(this)">' + escapeHtml(step) + '</div>' +
                    '</div>';
                });
