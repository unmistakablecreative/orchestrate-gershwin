<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gershwin App Store</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-card: #1e1a2e;
            --bg-card-locked: #1a1a1c;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-muted: #86868b;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --green: #30d158;
            --orange: #ff9f0a;
            --purple: #bf5af2;
            --red: #ff453a;
            --card-radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
        }

        .header-left h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 17px;
        }

        .credits-badge {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: right;
        }

        .credits-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .credits-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--green);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-tab:hover {
            background: #2c2c2e;
        }

        .filter-tab.active {
            background: var(--accent);
            color: white;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .tool-card {
            background: linear-gradient(145deg, #1e1a2e 0%, #151318 100%);
            border-radius: var(--card-radius);
            padding: 24px;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .tool-card.locked {
            background: linear-gradient(145deg, #1a1a1c 0%, #121214 100%);
            opacity: 0.85;
        }

        .tool-card.locked:hover {
            opacity: 1;
        }

        .tool-card.pre-installed {
            background: linear-gradient(145deg, #1a2a1e 0%, #121815 100%);
            border: 1px solid rgba(48, 209, 88, 0.2);
        }

        .tool-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .tool-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .tool-info {
            flex: 1;
            min-width: 0;
        }

        .tool-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.unlocked {
            background: rgba(48, 209, 88, 0.15);
            color: var(--green);
        }

        .status-badge.locked {
            background: rgba(255, 159, 10, 0.15);
            color: var(--orange);
        }

        .status-badge.pre-installed {
            background: rgba(48, 209, 88, 0.25);
            color: var(--green);
        }

        .unlock-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unlock-cost {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--orange);
        }

        .unlock-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .unlock-btn:hover {
            background: var(--accent-hover);
        }

        .unlock-btn:disabled {
            background: #3a3a3c;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .referral-section {
            background: linear-gradient(145deg, #1e1a2e 0%, #151318 100%);
            border-radius: var(--card-radius);
            padding: 32px;
            margin-top: 48px;
            border: 1px solid rgba(191, 90, 242, 0.2);
        }

        .referral-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .referral-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .referral-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .referral-stats {
            text-align: right;
        }

        .referral-stat {
            margin-bottom: 8px;
        }

        .referral-stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .referral-stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--purple);
        }

        .referral-form {
            display: flex;
            gap: 12px;
        }

        .referral-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .referral-input:focus {
            border-color: var(--purple);
        }

        .referral-input::placeholder {
            color: var(--text-muted);
        }

        .referral-btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: var(--purple);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .referral-btn:hover {
            background: #d070ff;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-secondary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--green);
        }

        .toast.error {
            border-left: 4px solid var(--red);
        }

        .icon-blue { background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%); }
        .icon-green { background: linear-gradient(135deg, #30d158 0%, #28a745 100%); }
        .icon-purple { background: linear-gradient(135deg, #bf5af2 0%, #9b4dca 100%); }
        .icon-orange { background: linear-gradient(135deg, #ff9f0a 0%, #e68a00 100%); }
        .icon-red { background: linear-gradient(135deg, #ff453a 0%, #cc352d 100%); }
        .icon-teal { background: linear-gradient(135deg, #5ac8fa 0%, #4ab3e5 100%); }
        .icon-pink { background: linear-gradient(135deg, #ff375f 0%, #cc2c4c 100%); }
        .icon-gray { background: linear-gradient(135deg, #636366 0%, #48484a 100%); }

        /* Profile Icon */
        .profile-icon {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 100;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .profile-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 20px rgba(191, 90, 242, 0.4);
        }

        .profile-modal-content {
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            min-width: 360px;
            max-width: 420px;
            text-align: center;
        }

        .profile-modal-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin: 0 auto 16px;
        }

        .profile-modal-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-modal-credits {
            margin: 24px 0;
            padding: 20px;
            background: rgba(48, 209, 88, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(48, 209, 88, 0.2);
        }

        .profile-credits-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .profile-credits-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--green);
        }

        .credit-packs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .credit-pack-btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .credit-pack-btn:hover {
            background: rgba(191, 90, 242, 0.1);
            border-color: var(--purple);
        }

        .credit-pack-amount {
            font-weight: 600;
            color: var(--purple);
        }

        .billing-btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .billing-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: var(--bg-secondary, #1a1a2e);
            border: 1px solid var(--border, #333);
            border-radius: 16px;
            padding: 32px;
            min-width: 400px;
            max-width: 500px;
        }
        .modal-input {
            width: 100%;
            background: var(--bg-primary, #0d0d1a);
            border: 1px solid var(--border, #333);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary, #fff);
            font-size: 14px;
            margin: 16px 0;
            box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 12px; margin-top: 8px; }
        .modal-btn {
            flex: 1;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border, #333);
            background: transparent;
        }
        .modal-btn.cancel { color: var(--text-secondary, #888); }
        .modal-btn.cancel:hover { background: var(--bg-hover, #222); }
        .modal-btn.confirm { 
            background: linear-gradient(135deg, #7C3AED, #6366F1);
            color: white;
            border: none;
        }
        .modal-btn.confirm:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="container">
<header class="header">
<div class="header-left">
<h1>App Store</h1>
<p>Unlock powerful tools to supercharge your workflow</p>
</div>
<div class="credits-badge">
<div class="credits-label">Available Credits</div>
<div class="credits-value" id="credits-balance">--</div>
</div>
</header>
<div class="filter-tabs">
<button class="filter-tab active" data-filter="all">All Tools</button>
<button class="filter-tab" data-filter="unlocked">Unlocked</button>
<button class="filter-tab" data-filter="locked">Locked</button>
</div>
<div class="tools-grid" id="tools-grid">
<div class="loading">
<div class="loading-spinner"></div>
<p>Loading tools...</p>
</div>
</div>
<section class="referral-section"><section class="referral-section">
<div class="referral-header">
<div>
<h2 class="referral-title">Earn Credits with Referrals</h2>
<p class="referral-subtitle">Invite friends to Gershwin and earn credits to unlock premium tools</p>
</div>
</div>
<div class="referral-form">
<input class="referral-input" id="referral-name" placeholder="Friend's name" type="text"/>
<input class="referral-input" id="referral-email" placeholder="Enter friend's email address" type="email"/>
<button class="referral-btn" id="send-referral">Send Invite</button>
</div>
</section></section>
</div>
<div class="toast" id="toast"></div><div class="modal-overlay" id="api-key-modal" style="display:none">
<div class="modal-content">
<h3>Enter API Key for <span id="api-key-tool-name"></span></h3>
<input class="modal-input" id="api-key-input" placeholder="API Key" type="password"/>
<div class="modal-buttons">
<button class="modal-btn cancel" onclick="closeApiKeyModal()">Cancel</button>
<button class="modal-btn confirm" id="api-key-confirm" onclick="confirmApiKey()">Confirm</button>
</div>
</div>
</div>
<div class="modal-overlay" id="profile-modal" style="display:none" onclick="if(event.target===this)closeProfileModal()">
    <div class="profile-modal-content">
        <div class="profile-modal-avatar" id="profile-modal-avatar">--</div>
        <div class="profile-modal-name" id="profile-modal-name">User</div>
        <div class="profile-modal-credits">
            <div class="profile-credits-label">Available Credits</div>
            <div class="profile-credits-value" id="profile-credits-value">--</div>
        </div>
        <div class="credit-packs">
            <button class="credit-pack-btn" onclick="purchaseCredits(50)">
                <span>50 Credits</span>
                <span class="credit-pack-amount">$5</span>
            </button>
            <button class="credit-pack-btn" onclick="purchaseCredits(100)">
                <span>100 Credits</span>
                <span class="credit-pack-amount">$9</span>
            </button>
            <button class="credit-pack-btn" onclick="purchaseCredits(250)">
                <span>250 Credits</span>
                <span class="credit-pack-amount">$20</span>
            </button>
        </div>
        <button class="billing-btn" onclick="updateBilling()">Update Billing Info</button>
        <button class="billing-btn" onclick="closeProfileModal()" style="margin-top:4px">Close</button>
    </div>
</div>

<script src="app_store.js"></script>
</body>
</html>
