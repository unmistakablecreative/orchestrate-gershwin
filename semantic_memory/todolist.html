<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - OrchestrateOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 2rem; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: #666; margin-top: 0.5rem; }

        /* Add Task Form */
        .add-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .add-form input {
            flex: 1;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(20,20,30,0.9);
            color: #fff;
            font-size: 1rem;
        }
        .add-form input:focus {
            outline: none;
            border-color: rgba(0,217,255,0.5);
        }
        .add-form input::placeholder { color: #555; }
        .add-form button {
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d9ff, #a855f7);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .add-form button:hover { opacity: 0.9; }
        .add-form button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Stats */
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .stat {
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            text-align: center;
        }
        .stat .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }
        .stat.pending .value { color: #f59e0b; }
        .stat.done .value { color: #10b981; }

        /* Filter */
        .filter {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .filter button {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter button:hover { border-color: rgba(0,217,255,0.3); color: #ccc; }
        .filter button.active {
            background: rgba(0,217,255,0.15);
            border-color: rgba(0,217,255,0.4);
            color: #00d9ff;
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(20,20,30,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            transition: all 0.2s;
        }
        .task-item:hover {
            border-color: rgba(0,217,255,0.2);
        }
        .task-item.completed {
            opacity: 0.5;
        }
        .task-item.completed .task-content {
            text-decoration: line-through;
            color: #666;
        }

        /* Checkbox */
        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .checkbox:hover { border-color: #10b981; }
        .checkbox.checked {
            background: #10b981;
            border-color: #10b981;
        }
        .checkbox.checked::after {
            content: '✓';
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .task-content {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
        }

        .task-date {
            font-size: 0.75rem;
            color: #555;
        }

        .delete-btn {
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            border: 1px solid rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.15s;
        }
        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.5);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #555;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            font-size: 0.9rem;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }

        /* Refresh */
        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: rgba(0,217,255,0.1);
            border: 1px solid rgba(0,217,255,0.3);
            color: #00d9ff;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .refresh-btn:hover { background: rgba(0,217,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Todo List</h1>
            <p>Simple task management</p>
        </header>

        <form class="add-form" onsubmit="addTask(event)">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button type="submit">Add</button>
        </form>

        <div class="stats">
            <div class="stat pending">
                <div class="label">Pending</div>
                <div class="value" id="pendingCount">0</div>
            </div>
            <div class="stat done">
                <div class="label">Completed</div>
                <div class="value" id="doneCount">0</div>
            </div>
        </div>

        <div class="filter">
            <button class="active" data-filter="pending" onclick="setFilter('pending')">Pending</button>
            <button data-filter="all" onclick="setFilter('all')">All</button>
        </div>

        <div class="task-list" id="taskList">
            <div class="empty-state">
                <div class="icon">&#128203;</div>
                <div>Loading tasks...</div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadTasks()">&#8635; Refresh</button>
    <div class="toast" id="toast"></div>

    <script>
        let tasks = [];
        let currentFilter = 'pending';
        const API = window.location.origin;

        document.addEventListener('DOMContentLoaded', loadTasks);

        async function loadTasks() {
            try {
                const showCompleted = currentFilter === 'all';
                const res = await fetch(`${API}/execute_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tool_name: 'todolist',
                        action: 'list_tasks',
                        params: {show_completed: showCompleted}
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    tasks = data.tasks || [];
                    renderTasks();
                    updateStats();
                }
            } catch (e) {
                console.error('Failed to load tasks:', e);
                showToast('Failed to load tasks', 'error');
            }
        }

        async function addTask(e) {
            e.preventDefault();
            const input = document.getElementById('taskInput');
            const content = input.value.trim();
            if (!content) return;

            input.disabled = true;
            try {
                const res = await fetch(`${API}/execute_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tool_name: 'todolist',
                        action: 'add_task',
                        params: {content}
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    input.value = '';
                    showToast('Task added', 'success');
                    await loadTasks();
                } else {
                    showToast(data.message || 'Failed to add task', 'error');
                }
            } catch (e) {
                showToast('Failed to add task', 'error');
            }
            input.disabled = false;
            input.focus();
        }

        async function toggleComplete(id, currentState) {
            if (currentState) return; // Already completed, don't uncomplete

            try {
                const res = await fetch(`${API}/execute_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tool_name: 'todolist',
                        action: 'complete_task',
                        params: {id}
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast('Task completed', 'success');
                    await loadTasks();
                }
            } catch (e) {
                showToast('Failed to complete task', 'error');
            }
        }

        async function deleteTask(id) {
            try {
                const res = await fetch(`${API}/execute_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tool_name: 'todolist',
                        action: 'delete_task',
                        params: {id}
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast('Task deleted', 'success');
                    await loadTasks();
                }
            } catch (e) {
                showToast('Failed to delete task', 'error');
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            loadTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');

            if (!tasks.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#10003;</div>
                        <div>${currentFilter === 'pending' ? 'All done! No pending tasks.' : 'No tasks yet. Add one above.'}</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = tasks.map(task => {
                const date = new Date(task.created_at).toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric'
                });
                return `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="checkbox ${task.completed ? 'checked' : ''}" onclick="toggleComplete(${task.id}, ${task.completed})"></div>
                    <div class="task-content">${escapeHtml(task.content)}</div>
                    <div class="task-date">${date}</div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                </div>
                `;
            }).join('');
        }

        async function updateStats() {
            // Fetch all tasks to get accurate stats
            try {
                const res = await fetch(`${API}/execute_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tool_name: 'todolist',
                        action: 'list_tasks',
                        params: {show_completed: true}
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    const allTasks = data.tasks || [];
                    const pending = allTasks.filter(t => !t.completed).length;
                    const done = allTasks.filter(t => t.completed).length;
                    document.getElementById('pendingCount').textContent = pending;
                    document.getElementById('doneCount').textContent = done;
                }
            } catch (e) {
                console.error('Failed to update stats:', e);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
