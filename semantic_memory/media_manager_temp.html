<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Media Manager | OrchestrateOS
  </title>
  <link href="media_manager.css" rel="stylesheet"/>
  <script>
   // Config path - can be overridden before load
        window.CONFIG_PATH = './media_manager_config.json';
  </script>
 </head>
 <body>
  <div class="header">
   <div>
    <h1>
     Media Manager
    </h1>
    <div class="subtitle">
     Convert videos, resize images, extract audio, and more
    </div>
   </div>
   <a class="home-link" href="orchestrate_home.html">
    ← Back to Home
   </a>
  </div>
  <div class="main-grid">
   <!-- Left Panel: Upload & Convert -->
   <div class="panel">
    <div class="panel-title">
     <svg class="panel-icon" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4">
      </path>
      <polyline points="17 8 12 3 7 8">
      </polyline>
      <line x1="12" x2="12" y1="3" y2="15">
      </line>
     </svg>
     Upload &amp; Convert
    </div>
    <div class="drop-zone" id="dropZone">
     <div class="drop-zone-icon">
      📁
     </div>
     <div class="drop-zone-text">
      Drag and drop files here
     </div>
     <div class="drop-zone-hint">
      or click to browse • Videos, images, audio, documents
     </div>
     <input accept="video/*,image/*,audio/*,.pdf,.docx,.csv,.json,.txt,.md" class="file-input" id="fileInput" type="file"/>
    </div>
    <div class="selected-file" id="selectedFile">
     <div class="file-info">
      <div class="file-icon" id="fileIcon">
       🎬
      </div>
      <div class="file-details">
       <div class="file-name" id="fileName">
        video.mp4
       </div>
       <div class="file-size" id="fileSize">
        12.5 MB
       </div>
      </div>
      <button class="file-remove" id="fileRemove">
       ✕
      </button>
     </div>
    </div>
    <div class="conversion-tabs">
     <button class="tab-btn active" data-tab="video">
      🎬 Video
     </button>
     <button class="tab-btn" data-tab="image">
      🖼️ Image
     </button>
     <button class="tab-btn" data-tab="document">
      📄 Document
     </button>
    </div>
    <!-- Video Options -->
    <div class="options-panel active" id="videoOptions">
     <div class="option-group">
      <label class="option-label">
       Output Format
      </label>
      <select class="option-select" id="videoFormat">
       <option value="mp4">
        MP4 (H.264)
       </option>
       <option value="webm">
        WebM
       </option>
       <option value="mov">
        MOV
       </option>
       <option value="avi">
        AVI
       </option>
       <option value="mp3">
        MP3 (Audio Only)
       </option>
      </select>
     </div>
    </div>
    <!-- Image Options -->
    <div class="options-panel" id="imageOptions">
     <div class="option-group">
      <label class="option-label">
       Operation
      </label>
      <select class="option-select" id="imageOperation">
       <option value="resize">
        Resize
       </option>
       <option value="compress">
        Compress
       </option>
       <option value="rembg">
        Remove Background
       </option>
      </select>
     </div>
     <div class="option-group" id="resizeGroup">
      <label class="option-label">
       Dimensions (px)
      </label>
      <div class="size-inputs">
       <input class="option-input" id="imageWidth" placeholder="Width" type="number" value="1920"/>
       <input class="option-input" id="imageHeight" placeholder="Height" type="number" value="1080"/>
      </div>
     </div>
    </div>
    <!-- Document Options -->
    <div class="options-panel" id="documentOptions">
     <div class="option-group">
      <label class="option-label">
       Convert To
      </label>
      <select class="option-select" id="documentFormat">
       <option value="txt">
        Plain Text (.txt)
       </option>
       <option value="md">
        Markdown (.md)
       </option>
       <option value="json">
        JSON
       </option>
       <option value="csv">
        CSV
       </option>
      </select>
     </div>
    </div>
    <button class="convert-btn" disabled="" id="convertBtn">
     Convert File
    </button>
    <div class="progress-container" id="progressContainer">
     <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar">
      </div>
     </div>
     <div class="progress-text">
      <span id="progressStatus">
       Processing...
      </span>
      <span id="progressPercent">
       0%
      </span>
     </div>
    </div>
   </div>
   <!-- Right Panel: YouTube & Results -->
   <div style="display: flex; flex-direction: column; gap: 24px;">
    <!-- YouTube Download -->
    <div class="panel">
     <div class="panel-title">
      <svg class="panel-icon" fill="currentColor" viewbox="0 0 24 24">
       <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z">
       </path>
      </svg>
      YouTube Download
     </div>
     <div class="youtube-input-group">
      <input class="youtube-input" id="youtubeUrl" placeholder="Paste YouTube URL..." type="text"/>
      <button class="youtube-btn" id="youtubeBtn">
       Download
      </button>
     </div>
    </div>
    <!-- Results -->
    <div class="panel" style="flex: 1;">
     <div class="panel-title">
      <svg class="panel-icon" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
       <polyline points="22 12 18 12 15 21 9 3 6 12 2 12">
       </polyline>
      </svg>
      Recent Activity
     </div>
     <div class="results-list" id="resultsList">
      <div class="empty-state">
       <div class="empty-state-icon">
        📋
       </div>
       <div>
        No recent conversions
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <div class="toast" id="toast">
   <span id="toastIcon">
    ✓
   </span>
   <span id="toastMessage">
    Success!
   </span>
  </div>
  <script src="./media_manager.js">
  </script>
 </body>
</html>
