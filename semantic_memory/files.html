<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files - OrchestrateOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #f8f8f8;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e5e5;
            font-weight: 600;
            font-size: 14px;
            color: #111;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header svg { width: 18px; height: 18px; color: #166ee1; }
        .directory-tree {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        .dir-item {
            padding: 8px 20px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s, color 0.15s;
        }
        .dir-item:hover { background: #efefef; }
        .dir-item.active {
            background: #e8f0fe;
            color: #166ee1;
            font-weight: 500;
        }
        .dir-item svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* Main Panel */
        .main-panel {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #166ee1;
            box-shadow: 0 0 0 3px rgba(22, 110, 225, 0.1);
        }
        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #999;
        }
        .current-path {
            font-size: 13px;
            color: #666;
        }
        .file-count {
            font-size: 12px;
            color: #999;
            margin-left: auto;
        }

        /* Table */
        .table-container {
            flex: 1;
            overflow-x: auto;
            padding: 0 24px 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            text-align: left;
            padding: 12px 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5e5;
            font-weight: 500;
            color: #555;
            position: sticky;
            top: 61px;
            z-index: 5;
        }
        tbody tr {
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.1s;
        }
        tbody tr:hover { background: #f9fafb; }
        tbody tr.expanded { background: #f0f7ff; }
        tbody td {
            padding: 12px 16px;
            vertical-align: middle;
        }
        .filename-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #166ee1;
        }
        .ext-badge {
            display: inline-block;
            padding: 2px 6px;
            background: #e8f0fe;
            color: #166ee1;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .size-cell { color: #666; }
        .date-cell { color: #888; font-size: 12px; }
        .rank-cell {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .rank-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .rank-high { background: #dcfce7; color: #166534; }
        .rank-medium { background: #fef9c3; color: #854d0e; }
        .rank-low { background: #fee2e2; color: #991b1b; }

        /* Expanded Row */
        .expanded-details {
            display: none;
            background: #fafbfc;
            border-bottom: 1px solid #e5e5e5;
        }
        .expanded-details.show { display: table-row; }
        .expanded-details td {
            padding: 20px 24px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .detail-item {
            padding: 12px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
        }
        .detail-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .detail-value {
            font-size: 14px;
            color: #1f2937;
            word-break: break-all;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: #888;
        }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e5e5e5;
            border-top-color: #166ee1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; color: #ccc; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            Directories
        </div>
        <div class="directory-tree" id="directoryTree">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading...
            </div>
        </div>
    </aside>

    <main class="main-panel">
        <header class="header">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search files..." />
            </div>
            <span class="current-path" id="currentPath">All Files</span>
            <span class="file-count" id="fileCount"></span>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Extension</th>
                        <th>Size</th>
                        <th>Modified</th>
                        <th>Purpose</th>
                        <th>Rank</th>
                    </tr>
                </thead>
                <tbody id="filesBody">
                    <tr>
                        <td colspan="6">
                            <div class="loading">
                                <div class="loading-spinner"></div>
                                Loading files...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = 'https://app.orchestrateos.io/execute_task';
        let currentDirectory = null;
        let expandedFileId = null;

        async function executeTask(toolName, action, params = {}) {
            try {
                const resp = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tool_name: toolName, action, params })
                });
                return await resp.json();
            } catch (e) {
                console.error('API Error:', e);
                return { status: 'error', message: e.message };
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '—';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            if (isNaN(d)) return dateStr;
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getRankClass(rank) {
            if (!rank) return '';
            const r = rank.toLowerCase();
            if (r.includes('high') || r.includes('critical') || r === 'a') return 'rank-high';
            if (r.includes('medium') || r === 'b') return 'rank-medium';
            return 'rank-low';
        }

        async function loadDirectories() {
            const tree = document.getElementById('directoryTree');
            const result = await executeTask('files_db', 'list_directory', {});

            if (result.status === 'error') {
                tree.innerHTML = `<div class="empty-state">Failed to load directories</div>`;
                return;
            }

            const dirs = result.directories || result.data || [];
            if (dirs.length === 0) {
                tree.innerHTML = `<div class="empty-state">No directories found</div>`;
                return;
            }

            tree.innerHTML = `
                <div class="dir-item active" data-dir="">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    All Files
                </div>
                ${dirs.map(d => `
                    <div class="dir-item" data-dir="${d.parent_dir || d}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        ${d.parent_dir || d}
                    </div>
                `).join('')}
            `;

            tree.querySelectorAll('.dir-item').forEach(item => {
                item.addEventListener('click', () => {
                    tree.querySelectorAll('.dir-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentDirectory = item.dataset.dir || null;
                    document.getElementById('currentPath').textContent = currentDirectory || 'All Files';
                    loadFiles(currentDirectory);
                });
            });
        }

        async function loadFiles(directory = null) {
            const tbody = document.getElementById('filesBody');
            tbody.innerHTML = `<tr><td colspan="6"><div class="loading"><div class="loading-spinner"></div>Loading files...</div></td></tr>`;

            const params = directory ? { directory } : {};
            const result = await executeTask('files_db', 'list_directory', params);

            if (result.status === 'error') {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Failed to load files</div></td></tr>`;
                return;
            }

            const files = result.files || result.data || [];
            renderFiles(files);
        }

        async function searchFiles(query) {
            if (!query || query.length < 2) {
                loadFiles(currentDirectory);
                return;
            }

            const tbody = document.getElementById('filesBody');
            tbody.innerHTML = `<tr><td colspan="6"><div class="loading"><div class="loading-spinner"></div>Searching...</div></td></tr>`;

            const result = await executeTask('files_db', 'search_files_fts', { query });

            if (result.status === 'error') {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Search failed</div></td></tr>`;
                return;
            }

            const files = result.files || result.data || result.results || [];
            renderFiles(files);
        }

        function renderFiles(files) {
            const tbody = document.getElementById('filesBody');
            const countEl = document.getElementById('fileCount');

            countEl.textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

            if (files.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    No files found
                </div></td></tr>`;
                return;
            }

            tbody.innerHTML = files.map((f, i) => `
                <tr data-file-id="${f.id || i}" onclick="toggleDetails(this, ${JSON.stringify(f).replace(/"/g, '&quot;')})">
                    <td>
                        <div class="filename-cell">
                            <span class="file-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                </svg>
                            </span>
                            ${f.filename || '—'}
                        </div>
                    </td>
                    <td><span class="ext-badge">${f.extension || '—'}</span></td>
                    <td class="size-cell">${formatBytes(f.size_bytes)}</td>
                    <td class="date-cell">${formatDate(f.modified_at)}</td>
                    <td>${f.purpose || '—'}</td>
                    <td class="rank-cell">
                        ${f.file_rank ? `<span class="rank-badge ${getRankClass(f.file_rank)}">${f.file_rank}</span>` : '—'}
                    </td>
                </tr>
                <tr class="expanded-details" id="details-${f.id || i}">
                    <td colspan="6">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">Full Path</div>
                                <div class="detail-value">${f.path || f.parent_dir ? (f.parent_dir + '/' + f.filename) : f.filename}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Size (bytes)</div>
                                <div class="detail-value">${f.size_bytes || 0}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Last Modified</div>
                                <div class="detail-value">${f.modified_at || '—'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Extension</div>
                                <div class="detail-value">${f.extension || '—'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Purpose</div>
                                <div class="detail-value">${f.purpose || 'Not specified'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">File Rank</div>
                                <div class="detail-value">${f.file_rank || 'Unranked'}</div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function toggleDetails(row, file) {
            const fileId = row.dataset.fileId;
            const detailsRow = document.getElementById(`details-${fileId}`);

            // Collapse previously expanded
            document.querySelectorAll('.expanded-details.show').forEach(el => {
                if (el.id !== `details-${fileId}`) {
                    el.classList.remove('show');
                    el.previousElementSibling.classList.remove('expanded');
                }
            });

            // Toggle current
            const isExpanded = detailsRow.classList.contains('show');
            detailsRow.classList.toggle('show');
            row.classList.toggle('expanded');

            // Optionally fetch full file details
            if (!isExpanded && file.id) {
                fetchFileDetails(file.id, detailsRow);
            }
        }

        async function fetchFileDetails(fileId, detailsRow) {
            const result = await executeTask('files_db', 'get_file', { file_id: fileId });
            if (result.status === 'success' && result.file) {
                const f = result.file;
                const grid = detailsRow.querySelector('.detail-grid');
                if (grid) {
                    grid.innerHTML = `
                        <div class="detail-item">
                            <div class="detail-label">Full Path</div>
                            <div class="detail-value">${f.path || f.parent_dir ? (f.parent_dir + '/' + f.filename) : f.filename}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Size (bytes)</div>
                            <div class="detail-value">${f.size_bytes || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Last Modified</div>
                            <div class="detail-value">${f.modified_at || '—'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Extension</div>
                            <div class="detail-value">${f.extension || '—'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Purpose</div>
                            <div class="detail-value">${f.purpose || 'Not specified'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">File Rank</div>
                            <div class="detail-value">${f.file_rank || 'Unranked'}</div>
                        </div>
                    `;
                }
            }
        }

        // Search debounce
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchFiles(e.target.value.trim());
            }, 300);
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadDirectories();
            loadFiles();
        });
    </script>
</body>
</html>
