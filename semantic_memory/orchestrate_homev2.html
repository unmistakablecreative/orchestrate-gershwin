<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/semantic_memory/">
    <title>OrchestrateOS</title>
    <link rel="stylesheet" href="orchestrate_homev2.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>OrchestrateOS</span>
                <button class="collapse-btn" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <div class="nav-section">
                <div class="nav-item active" data-view="home" data-shortcut="H">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span>Home</span>
                    <span class="shortcut">H</span>
                </div>
                <div class="nav-item" data-view="tasks" data-src="task_board.html" data-shortcut="T">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                    <span>Tasks</span>
                    <span class="shortcut">T</span>
                </div>
                <div class="nav-item" data-view="docs" data-src="doc_editor_v4.html" data-shortcut="D">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <span>Docs</span>
                    <span class="shortcut">D</span>
                </div>
                <div class="nav-item" data-view="images" data-src="public_image_generator.html" data-shortcut="I">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>Images</span>
                    <span class="shortcut">I</span>
                </div>
                <div class="nav-item" data-view="mockups" data-src="mockups/mockup_gallery.html" data-shortcut="M">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    <span>Mockups</span>
                    <span class="shortcut">M</span>
                </div>
                <div class="nav-item" data-view="brain" data-src="orchestrate_brain.html" data-shortcut="B">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a4 4 0 0 1 4 4c0 1.1-.9 2-2 2h-4a2 2 0 0 1-2-2 4 4 0 0 1 4-4z"/>
                        <path d="M12 8v14"/>
                        <path d="M8 12h8"/>
                        <circle cx="12" cy="18" r="4"/>
                    </svg>
                    <span>Brain</span>
                    <span class="shortcut">B</span>
                </div>
                <div class="nav-divider"></div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Home View -->
            <div id="homeView" class="view active">
                <div class="container">
                    <!-- Header -->
                    <div class="header">
                        <h1>OrchestrateOS</h1>
                        <p>What do you want to create?</p>
                    </div>

                    <!-- Action Icons Grid -->
                    <div id="actionGrid" class="action-grid">
                        <!-- Populated by JS -->
                    </div>

                    <!-- Output Cards Section -->
                    <div class="output-section">
                        <div class="output-header">
                            <span class="output-title">Recent Outputs</span>
                            <button class="output-clear" onclick="clearOutputs()">Clear</button>
                        </div>
                        <div id="outputGrid" class="output-grid">
                            <div id="emptyState" class="empty-state">
                                <div class="empty-state-icon">✨</div>
                                <p>Your outputs will appear here</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Iframe for sub-views -->
            <iframe id="viewFrame" class="view-frame"></iframe>
        </main>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
        <div class="progress-container">
            <div class="progress-header">
                <span class="progress-label">Task Progress</span>
                <span id="progressCount" class="progress-count">0 / 0 tasks</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Action Modal -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div id="modalIcon" class="modal-icon">📄</div>
                <div id="modalTitle" class="modal-title">Create Doc</div>
            </div>
            <textarea id="modalInput" class="modal-input" placeholder="Describe what you want..."></textarea>
            <div id="variationsField" class="form-group" style="display: none;">
                <label class="form-label">Variations</label>
                <input id="variationsInput" type="number" class="form-input" min="1" max="10" value="3" placeholder="Number of variations (1-10)">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button id="submitBtn" class="btn btn-primary" onclick="executeAction()">Create</button>
            </div>
        </div>
    </div>

    <!-- Custom Action Modal -->
    <div id="customActionOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">⚙️</div>
                <div class="modal-title">Add Custom Action</div>
            </div>
            <div class="custom-action-form">
                <div class="form-group">
                    <label class="form-label">Label</label>
                    <input id="customLabel" class="form-input" placeholder="e.g., Send Email">
                </div>
                <div class="form-group">
                    <label class="form-label">Tool Name</label>
                    <input id="customTool" class="form-input" placeholder="e.g., nylas_inbox">
                </div>
                <div class="form-group">
                    <label class="form-label">Action</label>
                    <input id="customAction" class="form-input" placeholder="e.g., send_email">
                </div>
                <div class="form-group">
                    <label class="form-label">Input Placeholder</label>
                    <input id="customPlaceholder" class="form-input" placeholder="e.g., Who to email?">
                </div>
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeCustomActionModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCustomAction()">Save Action</button>
            </div>
        </div>
    </div>

    <script src="orchestrate_homev2.js"></script>
    <script>
    // Dynamic sidebar unlock via postMessage from app_store iframe
    window.addEventListener('message', function(e) {
        if (!e.data || !e.data.type) return;

        if (e.data.type === 'tool_unlocked') {
            addNavItem(e.data);
        }

        if (e.data.type === 'claude_assistant_unlocked') {
            // Transition home state out of gated view
            window.claudeAssistantUnlocked = true;
            const taskLockedOverlay = document.querySelector('.task-locked-overlay');
            if (taskLockedOverlay) {
                taskLockedOverlay.remove();
            }
            // Show full dashboard - remove any gating classes
            document.body.classList.remove('gated');
            const homeView = document.getElementById('homeView');
            if (homeView) {
                homeView.classList.remove('gated');
            }
        }
    });

    function addNavItem(toolData) {
        const navSection = document.querySelector('.nav-section');
        const firstDivider = navSection.querySelector('.nav-divider');

        // Check if nav item already exists
        if (document.querySelector(`.nav-item[data-view="${toolData.tool_name}"]`)) {
            return;
        }

        const navItem = document.createElement('div');
        navItem.className = 'nav-item';
        navItem.dataset.view = toolData.tool_name;
        if (toolData.open_url) {
            navItem.dataset.src = toolData.open_url;
        }

        // Create icon span with emoji
        const iconSpan = document.createElement('span');
        iconSpan.className = `icon ${toolData.icon_class || ''}`;
        iconSpan.textContent = toolData.icon || '🔧';

        // Create name span
        const nameSpan = document.createElement('span');
        nameSpan.textContent = toolData.display_name || toolData.tool_name;

        navItem.appendChild(iconSpan);
        navItem.appendChild(nameSpan);

        // Add click handler same as existing nav items
        navItem.addEventListener('click', function() {
            // Remove active from all nav items
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            navItem.classList.add('active');

            // Load iframe if has src
            if (toolData.open_url) {
                const viewFrame = document.getElementById('viewFrame');
                const homeView = document.getElementById('homeView');
                if (viewFrame && homeView) {
                    homeView.classList.remove('active');
                    viewFrame.src = toolData.open_url;
                    viewFrame.style.display = 'block';
                }
            }
        });

        // Insert before the first divider
        if (firstDivider) {
            navSection.insertBefore(navItem, firstDivider);
        } else {
            navSection.appendChild(navItem);
        }
    }
    </script>
</body>
</html>
