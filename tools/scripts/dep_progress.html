<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gershwin - Installing Dependencies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0C0C0F;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #888;
            font-weight: 300;
        }

        .progress-container {
            background: #1a1a1f;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2a30;
        }

        .witty-message {
            font-size: 16px;
            font-weight: 500;
            color: #E44332;
            margin-bottom: 16px;
            min-height: 24px;
        }

        .progress-bar-bg {
            background: #2a2a30;
            border-radius: 8px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #E44332, #ff6b5b);
            height: 100%;
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s ease-out;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 100%
            );
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-text {
            font-size: 14px;
            color: #888;
            font-weight: 300;
        }

        .percent {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .complete-state {
            display: none;
            text-align: center;
        }

        .complete-state.visible {
            display: block;
        }

        .complete-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .complete-icon svg {
            width: 32px;
            height: 32px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }

        .complete-state h2 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .complete-state p {
            font-size: 14px;
            color: #888;
            font-weight: 300;
        }

        .installing-state {
            display: block;
        }

        .installing-state.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="headerTitle">Gershwin Setup</h1>
            <p id="headerSubtitle">Installing dependencies...</p>
        </div>

        <div class="progress-container">
            <div class="installing-state" id="installingState">
                <div class="witty-message" id="wittyMessage">Waiting...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-info">
                    <span class="progress-text" id="progressText">0 of 10 packages</span>
                    <span class="percent" id="percent">0%</span>
                </div>
            </div>

            <div class="complete-state" id="completeState">
                <div class="complete-icon">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2 id="completeTitle">Installation Complete</h2>
                <p id="completeSub">All dependencies installed successfully</p>
            </div>
        </div>
    </div>

    <script>
        const headerTitle = document.getElementById('headerTitle');
        const headerSubtitle = document.getElementById('headerSubtitle');
        const wittyMessage = document.getElementById('wittyMessage');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const percent = document.getElementById('percent');
        const installingState = document.getElementById('installingState');
        const completeState = document.getElementById('completeState');
        const completeTitle = document.getElementById('completeTitle');
        const completeSub = document.getElementById('completeSub');

        let pollInterval;
        let configLoaded = false;

        async function loadConfig() {
            try {
                const response = await fetch('/config');
                const config = await response.json();
                headerTitle.textContent = config.title;
                headerSubtitle.textContent = config.subtitle;
                completeTitle.textContent = config.complete_title;
                completeSub.textContent = config.complete_sub;
                configLoaded = true;
            } catch (err) {
                console.log('Config not loaded, using defaults');
            }
        }

        async function pollProgress() {
            try {
                const response = await fetch('/progress');
                const data = await response.json();

                if (data.done) {
                    clearInterval(pollInterval);
                    installingState.classList.add('hidden');
                    completeState.classList.add('visible');
                    return;
                }

                wittyMessage.textContent = data.message || `Installing ${data.current}...`;
                progressBar.style.width = `${data.percent}%`;
                progressText.textContent = `${data.index} of ${data.total} packages`;
                percent.textContent = `${data.percent}%`;

            } catch (err) {
                wittyMessage.textContent = 'Waiting for installer...';
            }
        }

        // Load config on page load
        loadConfig();

        // Poll every 500ms
        pollInterval = setInterval(pollProgress, 500);
        pollProgress();
    </script>
</body>
</html>
